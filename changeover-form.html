<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Be Here — Changeover Sign-off</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #D5D0C4;
      --dark:      #272F2E;
      --sage:      #646955;
      --sage-mid:  #989782;
      --gold:      #AF926A;
      --cream:     #F3E3C3;
      --blush:     #CCB09B;
      --surface:   #fff;
      --border:    #b8b4a8;
      --text:      #272F2E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: var(--dark); padding: 18px 20px 16px; }
    .header-inner { display: flex; align-items: center; gap: 14px; max-width: 500px; margin: 0 auto; }
    .header-logo { flex-shrink: 0; }
    .header-logo svg { display: block; width: 120px; height: auto; }
    .header-sub { font-size: 11px; color: var(--cream); opacity: 0.65; margin-top: 4px; letter-spacing: 0.3px; }
    .hdr-hub { color: rgba(255,255,255,.6); font-size: 12px; font-weight: 600; text-decoration: none; padding: 5px 10px; border: 1px solid rgba(255,255,255,.2); border-radius: 6px; margin-left: auto; white-space: nowrap; }
    .hdr-hub:hover { background: rgba(255,255,255,.1); color: #fff; }

    .form-wrap { padding: 20px 16px 40px; max-width: 500px; margin: 0 auto; }

    .field { margin-bottom: 22px; }
    .field > label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--sage); margin-bottom: 9px; }

    /* Date */
    input[type="date"] {
      width: 100%; padding: 15px 16px; border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--surface); font-size: 16px; color: var(--text); appearance: none; -webkit-appearance: none;
      font-family: inherit;
    }
    input[type="date"]:focus { outline: none; border-color: var(--dark); }

    /* Property */
    .prop-search-box { position: relative; }
    .prop-input {
      width: 100%; padding: 15px 16px; border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--surface); font-size: 16px; color: var(--text); font-family: inherit;
    }
    .prop-input:focus { outline: none; border-color: var(--dark); }
    .prop-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
      max-height: 240px; overflow-y: auto; z-index: 100; display: none;
      box-shadow: 0 4px 20px rgba(39,47,46,0.15);
    }
    .prop-dropdown.open { display: block; }
    .prop-option {
      padding: 14px 16px; font-size: 15px; cursor: pointer;
      border-bottom: 1px solid #eae8e2;
    }
    .prop-option:last-child { border-bottom: none; }
    .prop-option:active, .prop-option:hover { background: #eee9e0; color: var(--dark); font-weight: 600; }
    .prop-pill {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 16px; background: var(--dark); color: var(--cream); border-radius: 12px;
      cursor: pointer;
    }
    .prop-pill .pname { font-size: 16px; font-weight: 700; }
    .prop-pill .change-lbl { font-size: 12px; opacity: 0.6; }

    /* Activity buttons */
    .act-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .act-btn {
      padding: 20px 10px 16px; border: 2px solid var(--border); border-radius: 14px;
      background: var(--surface); cursor: pointer; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 9px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      -webkit-user-select: none; user-select: none;
    }
    .act-btn:active { transform: scale(0.96); }
    .act-btn .aicon { font-size: 30px; line-height: 1; }
    .act-btn .alabel { font-size: 13px; font-weight: 600; color: #555; line-height: 1.3; }
    .act-btn.full-width { grid-column: 1 / -1; flex-direction: row; gap: 14px; padding: 17px 20px; }
    .act-btn.full-width .alabel { font-size: 15px; }

    /* Selected states — using brand palette */
    .act-btn[data-idx="0"].sel { background: #eaede4; border-color: var(--sage); }
    .act-btn[data-idx="0"].sel .alabel { color: var(--sage); }
    .act-btn[data-idx="1"].sel { background: #f0ede7; border-color: var(--gold); }
    .act-btn[data-idx="1"].sel .alabel { color: var(--gold); }
    .act-btn[data-idx="2"].sel { background: #f5efe8; border-color: #B98B73; }
    .act-btn[data-idx="2"].sel .alabel { color: #B98B73; }
    .act-btn[data-idx="3"].sel { background: #eaede4; border-color: var(--sage); }
    .act-btn[data-idx="3"].sel .alabel { color: var(--sage); }
    .act-btn[data-idx="4"].sel { background: #edf0e8; border-color: var(--sage-mid); }
    .act-btn[data-idx="4"].sel .alabel { color: var(--dark); }

    /* Name input */
    input[type="text"] {
      width: 100%; padding: 15px 16px; border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--surface); font-size: 16px; color: var(--text); font-family: inherit;
    }
    input[type="text"]:focus { outline: none; border-color: var(--dark); }

    /* Submit */
    .submit-btn {
      width: 100%; padding: 17px; background: var(--dark); color: var(--cream); border: none;
      border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit;
      letter-spacing: 0.1px; margin-top: 4px; transition: background 0.15s, transform 0.1s;
    }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:hover { background: var(--sage); }
    .submit-btn:disabled { background: var(--sage-mid); cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--dark); color: var(--cream); padding: 14px 26px;
      border-radius: 30px; font-size: 14px; font-weight: 600;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { background: var(--sage); }
    .toast.err { background: #8B2020; }

    .dashboard-link {
      display: block; text-align: center; margin-top: 24px;
      font-size: 13px; color: var(--dark); text-decoration: none; font-weight: 600;
      opacity: 0.7;
    }
    .dashboard-link:hover { opacity: 1; text-decoration: underline; }

    /* Delivery confirmation panel */
    .delivery-panel { margin-top: 4px; }
    .delivery-loading { font-size: 13px; color: var(--sage-mid); padding: 8px 0; }
    .delivery-none { font-size: 13px; color: var(--sage-mid); padding: 8px 0; font-style: italic; }
    .delivery-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; border: 2px solid transparent; -webkit-tap-highlight-color: transparent; transition: all .15s; }
    .delivery-item.checked { background: #eaede4; border-color: var(--sage); }
    .delivery-chk { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; background: var(--surface); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .delivery-item.checked .delivery-chk { background: var(--sage); border-color: var(--sage); color: #fff; }
    .delivery-item-body { flex: 1; }
    .delivery-item-name { font-size: 15px; font-weight: 600; color: var(--dark); }
    .delivery-item-meta { font-size: 12px; color: var(--sage-mid); margin-top: 2px; }
    .delivery-hint { font-size: 12px; color: var(--sage-mid); margin-bottom: 10px; }
    .delivery-select-all { font-size: 13px; color: var(--sage); font-weight: 600; cursor: pointer; text-decoration: underline; }
  </style>
</head>

<div class="form-wrap">

  <!-- Date -->
  <div class="field">
    <label>Date</label>
    <input type="date" id="date-input">
  </div>

  <!-- Property -->
  <div class="field">
    <label>Property</label>
    <div class="prop-search-box" id="prop-box">
      <input type="text" class="prop-input" id="prop-input" placeholder="Search properties…" autocomplete="off">
      <div class="prop-dropdown" id="prop-dropdown"></div>
    </div>
    <div class="prop-pill" id="prop-pill" style="display:none" onclick="resetProperty()">
      <span class="pname" id="prop-pill-name"></span>
      <span class="change-lbl">tap to change</span>
    </div>
  </div>

  <!-- Activity -->
  <div class="field">
    <label>Activity</label>
    <div class="act-grid">
      <button class="act-btn" data-idx="0" onclick="selectAct(0)">
        <span class="aicon">🧹</span><span class="alabel">House Cleaned</span>
      </button>
      <button class="act-btn" data-idx="1" onclick="selectAct(1)">
        <span class="aicon">🚐</span><span class="alabel">Laundry Dropped</span>
      </button>
      <button class="act-btn" data-idx="2" onclick="selectAct(2)">
        <span class="aicon">🛒</span><span class="alabel">Restocked</span>
      </button>
      <button class="act-btn" data-idx="3" onclick="selectAct(3)">
        <span class="aicon">✅</span><span class="alabel">House Checked</span>
      </button>
      <button class="act-btn full-width" data-idx="4" onclick="selectAct(4)">
        <span class="aicon">🌿</span><span class="alabel">Outside Clean</span>
      </button>
    </div>
  </div>

  <!-- Delivery confirmation (shown when Restocked is selected) -->
  <div class="field" id="delivery-field" style="display:none">
    <label>Items delivered <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--sage-mid)">— tick what you actually restocked</span></label>
    <div class="delivery-hint">Only items logged as needed for this property are shown.</div>
    <span class="delivery-select-all" onclick="selectAllDelivery()">Select all</span>
    <div id="delivery-list"><div class="delivery-loading">Select a property first…</div></div>
  </div>

  <!-- Name -->
  <div class="field">
    <label>Your name</label>
    <input type="text" id="name-input" placeholder="e.g. Sarah" autocomplete="given-name">
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitLog()">Log Activity</button>
  <a href="arrivals-hub.html" class="dashboard-link">→ View Arrivals & Changeover Hub</a>
</div>

<div class="toast" id="toast"></div>

const preCleanId     = urlParams.get('clean_id') || '';
const prePropertyQS  = urlParams.get('property')  || '';
const preDateQS      = urlParams.get('date')      || '';
const preNameQS      = urlParams.get('name')      || '';
const preActQS       = (urlParams.get('act')      || '').toLowerCase();

let supplyItems = []; // outstanding items for current property

const ACTIVITIES = [
  { label: 'House Cleaned',   icon: '🧹' },
  { label: 'Laundry Dropped', icon: '🚐' },
  { label: 'Restocked',       icon: '🛒' },
  { label: 'House Checked',   icon: '✅' },
  { label: 'Outside Clean',   icon: '🌿' }
];

const PROPERTIES = [
  'Aintree','Ardross','Arlington Farm','Ascot','At Waters Edge',
  'Badgers Sett','Beaver Brook','Berry Farm Barn','Boathouse',
  'Cheltenham','Duck House','Egret','Epsom','Essitone House','Firefly',
  'Foxes Den','Goodwood','Goose Landing','Grebe Lodge','Green Haven',
  'Hideaway','Hill View','Homestead','Horseshoe Cottage','Island',
  'Kingfisher','Lake House','Libelle','Malachite','Mallard','Maricor',
  'Mayflower','Mirrors Edge','Newmarket','Pond','Rabbits Warren',
  'Serendipity','Serenity','Squirrels Drey','Still Waters','Summer Lake',
  'Swans Rest','The Atelier','The Barn','The Lookout','Tranquility',
  'Waterlily','Willow','York'
].sort();

let selProperty = null;
let selAct = null;

// Default date = today (or pre-filled from ?date=yyyy-mm-dd)
const todayStr = new Date().toISOString().split('T')[0];
document.getElementById('date-input').value = /^\d{4}-\d{2}-\d{2}$/.test(preDateQS) ? preDateQS : todayStr;

// Pre-fill name if passed (staff.html launcher sets ?name=)
if (preNameQS) document.getElementById('name-input').value = preNameQS;

// ── Property search ──────────────────────────────────────────
const propInput = document.getElementById('prop-input');
const propDropdown = document.getElementById('prop-dropdown');
const propPill = document.getElementById('prop-pill');
const propPillName = document.getElementById('prop-pill-name');

propInput.addEventListener('focus', () => renderDropdown(propInput.value));
propInput.addEventListener('input', () => renderDropdown(propInput.value));

document.addEventListener('click', e => {
  if (!e.target.closest('#prop-box')) propDropdown.classList.remove('open');
});

function renderDropdown(q) {
  const matches = q.trim()
    ? PROPERTIES.filter(p => p.toLowerCase().includes(q.toLowerCase()))
    : PROPERTIES;
  propDropdown.innerHTML = matches.map(p =>
    `<div class="prop-option" onclick="pickProp('${p.replace(/'/g,"\\'")}')">` + p + '</div>'
  ).join('') || '<div class="prop-option" style="color:#aaa">No match</div>';
  propDropdown.classList.add('open');
}

function pickProp(name) {
  selProperty = name;
  propDropdown.classList.remove('open');
  propInput.style.display = 'none';
  propPillName.textContent = name;
  propPill.style.display = 'flex';
  if (selAct === RESTOCKED_IDX) loadSupplyItems(name);
}

// Pre-fill property from URL if it matches a known one. Try exact (case-
// insensitive) first, then "property starts with or contains" so we tolerate
// e.g. "Kingfisher Lodge" vs the canonical "Kingfisher".
if (prePropertyQS) {
  const pq = prePropertyQS.toLowerCase();
  const match = PROPERTIES.find(p => p.toLowerCase() === pq)
             || PROPERTIES.find(p => pq.startsWith(p.toLowerCase()) || p.toLowerCase().startsWith(pq))
             || PROPERTIES.find(p => pq.includes(p.toLowerCase()));
  if (match) pickProp(match);
}

// Pre-select activity from URL (?act=cleaned|laundry|restocked|checked|outside)
(function preselectAct(){
  if (!preActQS) return;
  const map = { cleaned:0, clean:0, laundry:1, laundrydropped:1, 'laundry-dropped':1,
                restocked:2, restock:2, checked:3, check:3, outside:4, outsideclean:4 };
  const idx = map[preActQS.replace(/\s+/g,'')];
  if (typeof idx === 'number') setTimeout(() => selectAct(idx), 0);
})();

function resetProperty() {
  selProperty = null;
  propPill.style.display = 'none';
  propInput.style.display = '';
  propInput.value = '';
  propInput.focus();
  renderDropdown('');
}

// ── Activity selection ───────────────────────────────────────
function selectAct(idx) {
  selAct = idx;
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('sel'));
  document.querySelector(`.act-btn[data-idx="${idx}"]`).classList.add('sel');
  toggleDeliveryPanel();
}

function toggleDeliveryPanel() {
  const show = selAct === RESTOCKED_IDX;
  document.getElementById('delivery-field').style.display = show ? 'block' : 'none';
  if (show && selProperty) loadSupplyItems(selProperty);
}

async function loadSupplyItems(property) {
  const list = document.getElementById('delivery-list');
  list.innerHTML = '<div class="delivery-loading">Loading items for ' + property + '…</div>';
  try {
    const resp = await fetch('https://api.monday.com/v2', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': API_TOKEN, 'API-Version': '2024-01' },
      body: JSON.stringify({ query: `{ boards(ids:[${SUPPLIES_BOARD}]) { groups(ids:["${SUP_GROUP}"]) { items_page(limit:500) { items { id name column_values(ids:["text6__1","text60__1","numbers_MjiukVMp","priority6__1","text__1"]) { id text } } } } } }` })
    });
    const json = await resp.json();
    const allItems = json.data?.boards?.[0]?.groups?.[0]?.items_page?.items || [];
    supplyItems = allItems.filter(i => {
      const lodge = i.column_values.find(c=>c.id==='text6__1')?.text || '';
      return lodge.toLowerCase().trim() === property.toLowerCase().trim();
    });
    renderDeliveryList();
  } catch(e) {
    list.innerHTML = '<div class="delivery-loading">⚠️ Could not load items: ' + e.message + '</div>';
  }
}

function renderDeliveryList() {
  const list = document.getElementById('delivery-list');
  if (!supplyItems.length) {
    list.innerHTML = '<div class="delivery-none">No outstanding supply requests for this property.</div>';
    return;
  }
  list.innerHTML = supplyItems.map((item, i) => {
    const name  = item.column_values.find(c=>c.id==='text60__1')?.text || item.name;
    const qty   = item.column_values.find(c=>c.id==='numbers_MjiukVMp')?.text || '1';
    const prio  = item.column_values.find(c=>c.id==='priority6__1')?.text || '';
    const notes = item.column_values.find(c=>c.id==='text__1')?.text || '';
    return `<div class="delivery-item" id="di-${i}" onclick="toggleDeliveryItem(${i})">
      <div class="delivery-chk" id="dc-${i}"></div>
      <div class="delivery-item-body">
        <div class="delivery-item-name">${esc(name)}</div>
        <div class="delivery-item-meta">${prio ? prio + ' · ' : ''}×${qty}${notes ? ' · ' + esc(notes) : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleDeliveryItem(i) {
  const row = document.getElementById('di-'+i);
  const chk = document.getElementById('dc-'+i);
  const checked = row.classList.toggle('checked');
  chk.textContent = checked ? '✓' : '';
}

function selectAllDelivery() {
  supplyItems.forEach((_, i) => {
    document.getElementById('di-'+i)?.classList.add('checked');
    const chk = document.getElementById('dc-'+i);
    if (chk) chk.textContent = '✓';
  });
}

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

// ── Submit ───────────────────────────────────────────────────
async function submitLog() {
  const date = document.getElementById('date-input').value;
  const name = document.getElementById('name-input').value.trim();

  if (!selProperty)        { toast('Please select a property', 'err'); return; }
  if (selAct === null)     { toast('Please select an activity', 'err'); return; }
  if (!name)               { toast('Please enter your name', 'err'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Logging…';

  const actLabel = ACTIVITIES[selAct].label;
  const itemName = `${selProperty} • ${actLabel}`;
  const colVals = JSON.stringify({
    [COL_PROP]: selProperty,
    [COL_DATE]: { date },
    [COL_BY]:   name
  });

  const query = `mutation {
    create_item(board_id: ${LOG_BOARD}, item_name: ${JSON.stringify(itemName)},
      column_values: ${JSON.stringify(colVals)}) { id }
  }`;

  try {
    const res = await fetch('https://api.monday.com/v2', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': API_TOKEN },
      body: JSON.stringify({ query })
    });
    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);

    // If launched from staff.html as a "Mark complete" for a specific clean,
    // write CL_COMPLETED = the chosen date on the Cleans row. This is what
    // makes the rota-planner + staff page show the ✓ Done badge.
    if (preCleanId && selAct === CLEANED_IDX) {
      try {
        const cv = JSON.stringify({ [CL_COMPLETED]: { date } });
        const q = `mutation { change_multiple_column_values(board_id:${CLEANS_BOARD}, item_id:${preCleanId}, column_values:${JSON.stringify(cv)}){ id } }`;
        await fetch('https://api.monday.com/v2', {
          method: 'POST',
          headers: { 'Content-Type':'application/json','Authorization':API_TOKEN,'API-Version':'2024-01' },
          body: JSON.stringify({ query: q })
        });
      } catch (e) { /* non-fatal — the changeover log already saved */ }
    }

    // If Restocked, also mark checked supply items as delivered
    if (selAct === RESTOCKED_IDX && supplyItems.length) {
      const checkedIds = supplyItems
        .filter((_, i) => document.getElementById('di-'+i)?.classList.contains('checked'))
        .map(i => i.id);
      if (checkedIds.length) {
        const mutations = checkedIds.map((id, i) =>
          `m${i}a:change_column_value(board_id:${SUPPLIES_BOARD},item_id:${id},column_id:"status",value:"{\\"index\\":1}"){id} ` +
          `m${i}b:move_item_to_group(item_id:${id},group_id:"${CHARGEABLE_GROUP}"){id}`
        ).join('\n');
        await fetch('https://api.monday.com/v2', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': API_TOKEN, 'API-Version': '2024-01' },
          body: JSON.stringify({ query: `mutation{${mutations}}` })
        });
        toast(`✓ ${actLabel} logged · ${checkedIds.length} item${checkedIds.length>1?'s':''} marked delivered`, 'ok');
      } else {
        toast(`✓ ${actLabel} logged for ${selProperty}`, 'ok');
      }
    } else {
      toast(`✓ ${actLabel} logged for ${selProperty}`, 'ok');
    }

    selAct = null;
    supplyItems = [];
    document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('sel'));
    document.getElementById('delivery-field').style.display = 'none';
    document.getElementById('delivery-list').innerHTML = '<div class="delivery-loading">Select a property first…</div>';

    // If launched from staff.html ("Mark complete"), hop back there after a beat.
    if (preCleanId) setTimeout(() => { location.href = 'staff.html'; }, 1400);
  } catch (err) {
    toast('Error: ' + err.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Log Activity';
  }
}

// ── Toast ────────────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => { el.className = 'toast ' + type; }, 3200);
}
</script>
</body>
</html>
