<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager reports — Be Here</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#D5D0C4; --dark:#272F2E; --sage:#646955; --sage-mid:#989782;
    --gold:#AF926A; --cream:#F3E3C3; --surface:#fff; --border:#e0ddd6;
    --green:#2d6a4f; --green-bg:#edf7f2;
    --amber:#a86c00; --amber-bg:#fdf5e8;
    --red:#8B2020; --red-bg:#fdf0ec;
    --blue:#1a5276; --blue-bg:#eaf4fb;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Instrument Sans',-apple-system,BlinkMacSystemFont,sans-serif;
         background:var(--bg); color:var(--dark); min-height:100vh; padding:0; }

  header { background:var(--dark); color:#fff; padding:16px 22px;
           display:flex; align-items:center; justify-content:space-between; gap:14px; }
  header h1 { font-size:18px; font-weight:700; }
  header .sub { font-size:12px; opacity:0.7; margin-top:2px; }
  .hdr-back { color:rgba(255,255,255,0.7); text-decoration:none; font-size:13px; font-weight:600; }
  .hdr-back:hover { color:#fff; }

  .container { max-width:1100px; margin:0 auto; padding:18px 18px 60px; }

  /* Tabs */
  .tabs { display:flex; gap:8px; margin-bottom:18px; border-bottom:1.5px solid var(--border); padding-bottom:0; }
  .tab { padding:11px 18px; background:transparent; border:0; font-family:inherit;
         font-size:14px; font-weight:600; color:var(--sage-mid); cursor:pointer;
         border-bottom:3px solid transparent; transition:all 0.15s; margin-bottom:-1.5px; }
  .tab:hover { color:var(--dark); }
  .tab.active { color:var(--dark); border-bottom-color:var(--gold); }

  /* Filter card */
  .card { background:var(--surface); border-radius:13px; padding:16px 18px; margin-bottom:16px;
          box-shadow:0 1px 4px rgba(39,47,46,0.08); }
  .card-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.6px;
                color:var(--sage); margin-bottom:10px; }

  .filters { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
  .field { flex:1 1 180px; min-width:140px; }
  .field label { display:block; font-size:11px; font-weight:700; color:var(--sage);
                 margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
  .field input, .field select {
    width:100%; padding:10px 11px; border:1.5px solid var(--border); border-radius:8px;
    font-family:inherit; font-size:14px; color:var(--dark); background:#fff; outline:none;
    -webkit-appearance:none; appearance:none;
  }
  .field input:focus, .field select:focus { border-color:var(--dark); }

  .run-btn { padding:11px 22px; background:var(--dark); color:var(--cream);
             border:0; border-radius:9px; font-family:inherit; font-size:14px;
             font-weight:700; cursor:pointer; }
  .run-btn:hover { background:var(--sage); }
  .run-btn:disabled { opacity:0.5; cursor:not-allowed; }

  .msg { padding:11px 14px; border-radius:9px; font-size:13px; font-weight:600;
         margin-bottom:14px; display:none; }
  .msg.show { display:block; }
  .msg.error { background:var(--red-bg); color:var(--red); }
  .msg.info  { background:var(--blue-bg); color:var(--blue); }

  /* Day report */
  .summary-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .pill { background:var(--surface); border:1px solid var(--border); border-radius:10px;
          padding:10px 14px; font-size:13px; font-weight:600; color:var(--dark);
          flex:1 1 130px; min-width:110px; }
  .pill .pill-num { display:block; font-size:22px; font-weight:800; color:var(--dark); }
  .pill .pill-lbl { display:block; font-size:11px; font-weight:600; color:var(--sage-mid);
                    text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
  .pill.alt { background:var(--cream); }

  .visit-card { background:var(--surface); border-radius:11px; padding:14px 16px;
                margin-bottom:10px; border:1px solid var(--border); }
  .visit-hdr { display:flex; align-items:center; justify-content:space-between; gap:10px;
               margin-bottom:8px; flex-wrap:wrap; }
  .visit-prop { font-size:16px; font-weight:700; color:var(--dark); }
  .visit-meta { font-size:12px; color:var(--sage-mid); font-weight:500; }
  .badge { display:inline-block; padding:3px 9px; border-radius:6px; font-size:11px;
           font-weight:700; letter-spacing:0.3px; text-transform:uppercase; }
  .badge.ok { background:var(--green-bg); color:var(--green); }
  .badge.warn { background:var(--amber-bg); color:var(--amber); }
  .badge.wc { background:var(--blue-bg); color:var(--blue); }

  .reading-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(110px, 1fr));
                  gap:6px 10px; margin:8px 0; }
  .rd { background:#f8f6f0; padding:7px 9px; border-radius:7px; }
  .rd-lbl { font-size:10px; font-weight:600; color:var(--sage-mid); text-transform:uppercase; letter-spacing:0.4px; }
  .rd-val { font-size:14px; font-weight:700; color:var(--dark); }
  .rd-val.warn { color:var(--amber); }
  .rd-val.bad  { color:var(--red); }

  .chems { display:flex; flex-wrap:wrap; gap:6px; margin:6px 0 0; }
  .chem-pill { background:var(--cream); padding:4px 10px; border-radius:14px;
               font-size:12px; font-weight:600; color:var(--dark); }
  .chem-pill.zero { background:#f0eee6; color:var(--sage-mid); display:none; }

  .notes { font-size:13px; color:var(--dark); background:var(--blue-bg); padding:7px 10px;
           border-radius:7px; margin-top:8px; line-height:1.4; }

  /* Chemical usage */
  table { width:100%; border-collapse:collapse; }
  th, td { padding:8px 10px; text-align:left; font-size:13px; border-bottom:1px solid var(--border); }
  th { font-size:11px; font-weight:700; color:var(--sage); text-transform:uppercase;
       letter-spacing:0.5px; background:#fafaf6; position:sticky; top:0; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; }
  tr:hover td { background:#fafaf6; }
  tr.total td { font-weight:800; background:var(--cream); border-top:2px solid var(--gold); }

  /* Time-series chart — simple inline SVG, no library */
  .chart { background:#fff; border-radius:11px; padding:14px 16px; margin-top:10px;
           border:1px solid var(--border); }
  .chart svg { width:100%; height:auto; display:block; }
  .chart-legend { display:flex; flex-wrap:wrap; gap:8px 14px; margin-top:8px; font-size:11px;
                  color:var(--sage); }
  .chart-legend span.dot { display:inline-block; width:10px; height:10px; border-radius:2px;
                            margin-right:5px; vertical-align:middle; }

  .empty { padding:40px 20px; text-align:center; color:var(--sage-mid); font-style:italic; }

  .hide { display:none !important; }

  @media print {
    body { background:#fff; }
    header, .tabs, .filters, .run-btn { display:none !important; }
    .card { box-shadow:none; border:1px solid #ccc; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📊 Manager reports</h1>
    <div class="sub">Hot tub readings · chemical usage</div>
  </div>
  <a class="hdr-back" href="hub.html">‹ Hub</a>
</header>

<script src="secrets.js"></script>

<div class="container">
  <div class="tabs">
    <button class="tab active" id="tabDay"  onclick="switchTab('day')">Staff day report</button>
    <button class="tab"        id="tabChem" onclick="switchTab('chem')">Chemical usage</button>
  </div>

  <div id="msgBox" class="msg"></div>

  <!-- ── Tab 1: Staff day report ───────────────────────────────────── -->
  <section id="paneDay">
    <div class="card">
      <div class="card-title">Pick a staff member and a date</div>
      <div class="filters">
        <div class="field">
          <label for="dStaff">Staff member</label>
          <select id="dStaff"><option value="">Loading…</option></select>
        </div>
        <div class="field">
          <label for="dDate">Date</label>
          <input type="date" id="dDate">
        </div>
        <div><button class="run-btn" id="dRun" onclick="runDayReport()">Run report</button></div>
        <div><button class="run-btn" style="background:var(--sage);" onclick="window.print()">Print</button></div>
      </div>
    </div>
    <div id="dResult"></div>
  </section>

  <!-- ── Tab 2: Chemical usage ─────────────────────────────────────── -->
  <section id="paneChem" class="hide">
    <div class="card">
      <div class="card-title">Pick a date range</div>
      <div class="filters">
        <div class="field">
          <label for="cFrom">From</label>
          <input type="date" id="cFrom">
        </div>
        <div class="field">
          <label for="cTo">To</label>
          <input type="date" id="cTo">
        </div>
        <div><button class="run-btn" id="cRun" onclick="runChemReport()">Run report</button></div>
        <div><button class="run-btn" style="background:var(--sage);" onclick="window.print()">Print</button></div>
      </div>
    </div>
    <div id="cResult"></div>
  </section>
</div>

<script>
/* ─── Config ─────────────────────────────────────────────────── */
const URL_API        = 'https://api.monday.com/v2';
const CHARGING_BOARD = 1621263971;        // hot tub readings
const STAFF_BOARD    = 5095127554;
const ST_ROLE        = 'color_mm2psadz';

/* Charging board column IDs — copied from hot-tub.html, kept in lockstep. */
const CC = {
  status:       'status6__1',
  dateCleaned:  'date4',
  tester:       'text__1',
  temp:         'numbers__1',
  finalPH:      'numbers9__1',
  finalBrom:    'numbers5__1',
  initPH:       'numeric_mkrabdeg',
  initBrom:     'numeric_mkra56tq',
  waterChange:  'text_mkzapa47',
  tds:          'numbers1__1',
  ta:           'numbers6__1',
  bromTabs:     'bromine_tabs2__1',
  bromGran:     'numbers_Mjj21mkM',
  ncs:          'ncs0__1',
  cs:           'cs9__1',
  phUp:         'ph_increaser9__1',
  phDown:       'ph_decreaser0__1',
  alk:          'alkalinity_raiser5__1',
  clarifier:    'clarifier2__1',
  foamAway:     'foam_away07__1',
  bromReduce:   'numeric_mkzcaarj',
  pipeCleaner:  'numeric_mkzc2w6c',
  lodge:        'text3__1',
  // Canonical link to the Staff board — populated by hot-tub.html when a
  // staff member is picked from the dynamic dropdown. Auto-bootstrapped on
  // first run so the column ID isn't fixed at code-write time. Manager
  // reports prefer this for grouping; tester text is the legacy fallback.
  testerStaff:  localStorage.getItem('cache_cc_tester_staff_col') || '',
};

/* All chemical column keys + display labels. Order = display order. */
const CHEMS = [
  { key:'phUp',        label:'pH Increaser' },
  { key:'phDown',      label:'pH Decreaser' },
  { key:'alk',         label:'Alkalinity Raiser' },
  { key:'bromTabs',    label:'Bromine Tabs' },
  { key:'bromGran',    label:'Bromine Granules' },
  { key:'bromReduce',  label:'Bromine Reducer' },
  { key:'ncs',         label:'Non-Chlorine Shock' },
  { key:'cs',          label:'Chlorine Shock' },
  { key:'clarifier',   label:'Clarifier' },
  { key:'foamAway',    label:'Foam Away' },
  { key:'pipeCleaner', label:'Pipe Cleaner' },
];

/* ─── State ──────────────────────────────────────────────────── */
let _staff = [];        // [{id,name,role}]

/* ─── Helpers ────────────────────────────────────────────────── */
async function mq(query) {
  const r = await fetch(URL_API, {
    method:'POST',
    headers:{ 'Content-Type':'application/json',
              Authorization: window.MONDAY_API_TOKEN, 'API-Version':'2024-01' },
    body: JSON.stringify({ query }),
  });
  const j = await r.json();
  if (j.errors) throw new Error('Monday: ' + j.errors[0].message);
  return j.data;
}

function pj(v) { if (v == null || v === '') return null; try { return typeof v === 'string' ? JSON.parse(v) : v; } catch { return null; } }
function num(s) { const n = parseFloat(s); return isNaN(n) ? 0 : n; }
function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtUK(iso) {
  if (!iso) return '';
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}-${m[2]}-${m[1].slice(2)}` : iso;
}
function todayISO() { return new Date().toISOString().slice(0,10); }

function showMsg(text, type) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'msg show ' + type;
  if (type === 'success') setTimeout(() => box.classList.remove('show'), 5000);
}

function switchTab(tab) {
  document.getElementById('tabDay').classList.toggle('active',  tab === 'day');
  document.getElementById('tabChem').classList.toggle('active', tab === 'chem');
  document.getElementById('paneDay').classList.toggle('hide',   tab !== 'day');
  document.getElementById('paneChem').classList.toggle('hide',  tab !== 'chem');
}

/* ─── Boot ───────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  // Defaults: today for day report; current month for chemicals.
  document.getElementById('dDate').value = todayISO();
  const today = new Date();
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().slice(0,10);
  document.getElementById('cFrom').value = monthStart;
  document.getElementById('cTo').value   = todayISO();

  // Pull staff list for the dropdown. value = Staff board item id (canonical
  // for matching new readings via the board_relation). Visible text = name.
  try {
    await loadStaff();
    const sel = document.getElementById('dStaff');
    sel.innerHTML = '<option value="">— pick a staff member —</option>' +
      _staff.map(s => `<option value="${escapeHtml(s.id)}">${escapeHtml(s.name)}${s.role ? ' · ' + escapeHtml(s.role) : ''}</option>`).join('');
  } catch (e) {
    showMsg('Could not load staff list: ' + e.message, 'error');
  }
});

async function loadStaff() {
  const data = await mq(`{
    boards(ids:[${STAFF_BOARD}]) {
      items_page(limit:200) {
        items { id name column_values(ids:["${ST_ROLE}"]) { id text } }
      }
    }
  }`);
  _staff = (data?.boards?.[0]?.items_page?.items || []).map(it => {
    const cv = Object.fromEntries(it.column_values.map(c => [c.id, c]));
    return { id: it.id, name: it.name, role: cv[ST_ROLE]?.text || '' };
  }).sort((a,b) => a.name.localeCompare(b.name));
}

/* ─── Pull readings from the Charging board ──────────────────────
   Returns flat array of reading objects with all chemicals + readings
   parsed. Filters by date range client-side.

   Date range matching uses CC.dateCleaned. Pagination loops until
   no cursor; cap of 50 pages × 500 = 25000 readings.

   The tester staff link column ID is bootstrapped by hot-tub.html on
   first run; before the column exists CC.testerStaff is empty and we
   omit it from the column-id list (Monday will reject queries that
   reference a non-existent column). */
async function loadReadings(fromISO, toISO) {
  const colKeys = Object.entries(CC).filter(([_, id]) => id).map(([_, id]) => id);
  const colIds = colKeys.map(id => `"${id}"`).join(',');
  // BoardRelationValue fragment — needed so testerStaff returns linked_item_ids
  // when the column exists. Harmless when it doesn't.
  let cursor = null, all = [], pages = 0;
  do {
    const cursorPart = cursor ? `, cursor:"${cursor}"` : '';
    const data = await mq(`{
      boards(ids:[${CHARGING_BOARD}]) {
        items_page(limit:500${cursorPart}) {
          cursor
          items {
            id name created_at
            column_values(ids:[${colIds}]) {
              id text value
              ... on BoardRelationValue { linked_item_ids }
            }
          }
        }
      }
    }`);
    const page = data.boards[0].items_page;
    all = all.concat(page.items || []);
    cursor = page.cursor;
    pages++;
    if (pages > 50) break;
  } while (cursor);

  return all.map(parseReading).filter(r => {
    if (!r.date) return false;
    return r.date >= fromISO && r.date <= toISO;
  }).sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
}

function parseReading(it) {
  const cv = Object.fromEntries((it.column_values || []).map(c => [c.id, c]));
  const dateObj = pj(cv[CC.dateCleaned]?.value);
  const date = dateObj?.date || '';
  const time = (dateObj?.time || '').slice(0,5);
  // Tester text column. Legacy field kept for older readings that pre-date
  // the Staff board_relation. New readings (post-fix) populate testerStaff
  // with the canonical Staff item id.
  const tester = (cv[CC.tester]?.text || '').trim();
  // Linked Staff item id (preferred). Stays empty for legacy rows.
  const testerStaffIds = (CC.testerStaff && cv[CC.testerStaff]?.linked_item_ids) || [];
  const testerStaffId  = testerStaffIds.length ? String(testerStaffIds[0]) : '';
  const lodge  = (cv[CC.lodge]?.text  || it.name || '').trim();
  const out = {
    id: it.id, name: it.name,
    date, time, tester, testerStaffId, lodge,
    status:      (cv[CC.status]?.text || '').trim(),
    temp:        num(cv[CC.temp]?.text),
    initPH:      num(cv[CC.initPH]?.text),
    initBrom:    num(cv[CC.initBrom]?.text),
    finalPH:     num(cv[CC.finalPH]?.text),
    finalBrom:   num(cv[CC.finalBrom]?.text),
    tds:         num(cv[CC.tds]?.text),
    ta:          num(cv[CC.ta]?.text),
    waterChange: (cv[CC.waterChange]?.text || '').trim(),
    chems: {},
  };
  for (const c of CHEMS) {
    out.chems[c.key] = num(cv[CC[c.key]]?.text);
  }
  out.chemTotal = CHEMS.reduce((s,c) => s + out.chems[c.key], 0);
  return out;
}

/* ─── DAY REPORT ────────────────────────────────────────────── */
async function runDayReport() {
  // Read both the value (Staff item id) and visible text (name). Selecting
  // by id is the canonical match for new readings; the name fallback covers
  // any legacy readings written before the board_relation existed.
  const staffSel = document.getElementById('dStaff');
  const staffOpt = staffSel?.selectedOptions?.[0];
  const staffId   = staffOpt?.value || '';
  const staffName = staffOpt?.text  || '';
  const date  = document.getElementById('dDate').value;
  if (!staffId)   { showMsg('Pick a staff member first', 'error'); return; }
  if (!date)      { showMsg('Pick a date first', 'error'); return; }

  const btn = document.getElementById('dRun');
  btn.disabled = true; btn.textContent = 'Loading…';
  document.getElementById('dResult').innerHTML = '<div class="empty">Loading readings…</div>';

  try {
    const readings = await loadReadings(date, date);
    // Prefer the staff_id board_relation when set; fall back to text match
    // for legacy rows. testerMatches() handles "Barry" vs "Barry Thurston".
    const mine = readings.filter(r => {
      if (r.testerStaffId && r.testerStaffId === staffId) return true;
      if (!r.testerStaffId && testerMatches(r.tester, staffName)) return true;
      return false;
    });
    renderDayReport(staffName, date, mine);
  } catch (e) {
    showMsg('Failed: ' + e.message, 'error');
    document.getElementById('dResult').innerHTML = '';
  } finally {
    btn.disabled = false; btn.textContent = 'Run report';
  }
}

/* True if the tester field on a reading row matches the staff name the user
   picked. Case-insensitive. Either string can be a strict subset / first-
   token of the other. Empty tester never matches. */
function testerMatches(testerField, staffName) {
  const a = (testerField || '').trim().toLowerCase();
  const b = (staffName  || '').trim().toLowerCase();
  if (!a || !b) return false;
  if (a === b) return true;
  // First-token match: "barry" vs "barry thurston" → both first tokens are "barry"
  const aFirst = a.split(/\s+/)[0];
  const bFirst = b.split(/\s+/)[0];
  if (aFirst && aFirst === bFirst) return true;
  // Either-side contains check (handles weird cases like full-name in tester
  // but only first-name selected, or vice versa)
  if (a.includes(b)) return true;
  if (b.includes(a)) return true;
  return false;
}

function rangeClass(val, lo, hi) {
  if (!val) return '';
  if (val < lo || val > hi) return 'bad';
  // Soft warning band: within 5% of edge
  const edge = (hi - lo) * 0.05;
  if (val <= lo + edge || val >= hi - edge) return 'warn';
  return '';
}

function renderDayReport(staff, date, readings) {
  const div = document.getElementById('dResult');
  if (!readings.length) {
    div.innerHTML = `<div class="card"><div class="empty">No readings logged for ${escapeHtml(staff)} on ${fmtUK(date)}.</div></div>`;
    return;
  }

  // Aggregate summary.
  const visits      = readings.length;
  const wcCount     = readings.filter(r => /^yes|^y/i.test(r.waterChange) || r.waterChange === '✓' || r.waterChange === 'true').length;
  const totalTime   = 0;   // duration not stored on readings; staff app captures it on Cleans rows
  const lodges      = new Set(readings.map(r => r.lodge));
  const chemTotals  = {};
  for (const c of CHEMS) chemTotals[c.key] = readings.reduce((s,r) => s + (r.chems[c.key]||0), 0);

  let html = `
    <div class="summary-bar">
      <div class="pill"><span class="pill-num">${visits}</span><span class="pill-lbl">Visit${visits===1?'':'s'}</span></div>
      <div class="pill"><span class="pill-num">${lodges.size}</span><span class="pill-lbl">Lodge${lodges.size===1?'':'s'}</span></div>
      <div class="pill alt"><span class="pill-num">${wcCount}</span><span class="pill-lbl">Water change${wcCount===1?'':'s'}</span></div>
      <div class="pill alt"><span class="pill-num">${Object.values(chemTotals).reduce((s,v)=>s+v,0)}</span><span class="pill-lbl">Chemical units</span></div>
    </div>
  `;

  html += `<div class="card"><div class="card-title">${escapeHtml(staff)} · ${fmtUK(date)}</div>`;
  for (const r of readings) {
    const wc = (/^yes|^y/i.test(r.waterChange) || r.waterChange === '✓' || r.waterChange === 'true');
    const chemsList = CHEMS
      .filter(c => (r.chems[c.key]||0) > 0)
      .map(c => `<span class="chem-pill">${escapeHtml(c.label)}: ${r.chems[c.key]}</span>`)
      .join('');
    html += `<div class="visit-card">
      <div class="visit-hdr">
        <div>
          <div class="visit-prop">${escapeHtml(r.lodge)}</div>
          <div class="visit-meta">${r.time || '—'} · ${escapeHtml(r.status || 'reading')}</div>
        </div>
        <div>
          ${wc ? '<span class="badge wc">Water change</span>' : ''}
        </div>
      </div>
      <div class="reading-grid">
        ${r.initPH    ? `<div class="rd"><div class="rd-lbl">Initial pH</div><div class="rd-val ${rangeClass(r.initPH,7.2,7.6)}">${r.initPH}</div></div>` : ''}
        ${r.initBrom  ? `<div class="rd"><div class="rd-lbl">Initial Br</div><div class="rd-val ${rangeClass(r.initBrom,3,5)}">${r.initBrom}</div></div>` : ''}
        ${r.finalPH   ? `<div class="rd"><div class="rd-lbl">Final pH</div><div class="rd-val ${rangeClass(r.finalPH,7.2,7.6)}">${r.finalPH}</div></div>` : ''}
        ${r.finalBrom ? `<div class="rd"><div class="rd-lbl">Final Br</div><div class="rd-val ${rangeClass(r.finalBrom,3,5)}">${r.finalBrom}</div></div>` : ''}
        ${r.temp      ? `<div class="rd"><div class="rd-lbl">Temp °C</div><div class="rd-val">${r.temp}</div></div>` : ''}
        ${r.ta        ? `<div class="rd"><div class="rd-lbl">TA</div><div class="rd-val">${r.ta}</div></div>` : ''}
        ${r.tds       ? `<div class="rd"><div class="rd-lbl">TDS</div><div class="rd-val">${r.tds}</div></div>` : ''}
      </div>
      ${chemsList ? `<div class="chems">${chemsList}</div>` : ''}
    </div>`;
  }

  // Daily chemical totals, if any chemicals at all.
  const chemTotalEntries = Object.entries(chemTotals).filter(([_,v]) => v > 0);
  if (chemTotalEntries.length) {
    html += `<div class="card-title" style="margin-top:14px">Chemicals used today</div>
      <table>
        <thead><tr><th>Chemical</th><th class="num">Total</th></tr></thead>
        <tbody>
        ${CHEMS.filter(c => chemTotals[c.key] > 0).map(c =>
          `<tr><td>${escapeHtml(c.label)}</td><td class="num">${chemTotals[c.key]}</td></tr>`
        ).join('')}
        </tbody>
      </table>`;
  }

  html += `</div>`;
  div.innerHTML = html;
}

/* ─── CHEMICAL USAGE REPORT ─────────────────────────────────── */
async function runChemReport() {
  const from = document.getElementById('cFrom').value;
  const to   = document.getElementById('cTo').value;
  if (!from || !to) { showMsg('Pick both dates', 'error'); return; }
  if (from > to)    { showMsg('From must be before To', 'error'); return; }

  const btn = document.getElementById('cRun');
  btn.disabled = true; btn.textContent = 'Loading…';
  document.getElementById('cResult').innerHTML = '<div class="empty">Loading readings…</div>';

  try {
    const readings = await loadReadings(from, to);
    renderChemReport(from, to, readings);
  } catch (e) {
    showMsg('Failed: ' + e.message, 'error');
    document.getElementById('cResult').innerHTML = '';
  } finally {
    btn.disabled = false; btn.textContent = 'Run report';
  }
}

function renderChemReport(from, to, readings) {
  const div = document.getElementById('cResult');
  if (!readings.length) {
    div.innerHTML = `<div class="card"><div class="empty">No readings between ${fmtUK(from)} and ${fmtUK(to)}.</div></div>`;
    return;
  }

  /* ── 1. Per-chemical totals across the range. ── */
  const totals = {};
  for (const c of CHEMS) totals[c.key] = 0;
  for (const r of readings) {
    for (const c of CHEMS) totals[c.key] += r.chems[c.key] || 0;
  }
  const grand = Object.values(totals).reduce((s,v) => s+v, 0);

  let html = `<div class="summary-bar">
    <div class="pill"><span class="pill-num">${readings.length}</span><span class="pill-lbl">Readings</span></div>
    <div class="pill alt"><span class="pill-num">${grand}</span><span class="pill-lbl">Chemical units</span></div>
  </div>`;

  /* ── 2. Per-chemical totals table. ── */
  html += `<div class="card">
    <div class="card-title">Totals · ${fmtUK(from)} → ${fmtUK(to)}</div>
    <table>
      <thead><tr><th>Chemical</th><th class="num">Total used</th></tr></thead>
      <tbody>
      ${CHEMS.map(c => `<tr><td>${escapeHtml(c.label)}</td><td class="num">${totals[c.key] || 0}</td></tr>`).join('')}
      <tr class="total"><td>All chemicals</td><td class="num">${grand}</td></tr>
      </tbody>
    </table>
  </div>`;

  /* ── 3. Per-lodge breakdown. ── */
  const byLodge = {};
  for (const r of readings) {
    const k = r.lodge || '(unknown)';
    if (!byLodge[k]) byLodge[k] = { count:0, chems:Object.fromEntries(CHEMS.map(c => [c.key, 0])) };
    byLodge[k].count++;
    for (const c of CHEMS) byLodge[k].chems[c.key] += r.chems[c.key] || 0;
  }
  const lodgeRows = Object.entries(byLodge)
    .map(([lodge, d]) => ({
      lodge, count: d.count,
      total: CHEMS.reduce((s,c) => s + d.chems[c.key], 0),
      chems: d.chems,
    }))
    .sort((a,b) => b.total - a.total);

  html += `<div class="card">
    <div class="card-title">Per lodge</div>
    <table>
      <thead><tr><th>Lodge</th><th class="num">Visits</th>
        ${CHEMS.map(c => `<th class="num" title="${escapeHtml(c.label)}">${escapeHtml(c.label.split(' ')[0])}</th>`).join('')}
        <th class="num">Total</th></tr></thead>
      <tbody>
      ${lodgeRows.map(r => `<tr>
        <td><strong>${escapeHtml(r.lodge)}</strong></td>
        <td class="num">${r.count}</td>
        ${CHEMS.map(c => `<td class="num">${r.chems[c.key] || ''}</td>`).join('')}
        <td class="num"><strong>${r.total}</strong></td>
      </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  /* ── 4. Per-staff breakdown. ──
     Group by Staff item id (canonical) when present, falling back to the
     normalised first-name text for legacy rows. _staff is the list pulled
     on page load so we can map ids back to display names cleanly. */
  const staffById = new Map(_staff.map(s => [s.id, s.name]));
  const byStaff = {};
  for (const r of readings) {
    let key, displayName;
    if (r.testerStaffId) {
      key = 'id:' + r.testerStaffId;
      displayName = staffById.get(r.testerStaffId) || ('Staff ' + r.testerStaffId);
    } else {
      // Legacy rows: collapse "Meg", "meg", "Meg " into one bucket.
      const t = (r.tester || '').trim();
      const norm = t.toLowerCase().split(/\s+/)[0] || '(unknown)';
      key = 'name:' + norm;
      displayName = t || '(unknown)';
    }
    if (!byStaff[key]) byStaff[key] = { name: displayName, count:0, chems:Object.fromEntries(CHEMS.map(c => [c.key, 0])) };
    byStaff[key].count++;
    for (const c of CHEMS) byStaff[key].chems[c.key] += r.chems[c.key] || 0;
  }
  const staffRows = Object.values(byStaff)
    .map(d => ({
      tester: d.name, count: d.count,
      total: CHEMS.reduce((s,c) => s + d.chems[c.key], 0),
      chems: d.chems,
    }))
    .sort((a,b) => b.total - a.total);

  html += `<div class="card">
    <div class="card-title">Per staff member</div>
    <table>
      <thead><tr><th>Staff</th><th class="num">Visits</th>
        ${CHEMS.map(c => `<th class="num" title="${escapeHtml(c.label)}">${escapeHtml(c.label.split(' ')[0])}</th>`).join('')}
        <th class="num">Total</th></tr></thead>
      <tbody>
      ${staffRows.map(r => `<tr>
        <td><strong>${escapeHtml(r.tester)}</strong></td>
        <td class="num">${r.count}</td>
        ${CHEMS.map(c => `<td class="num">${r.chems[c.key] || ''}</td>`).join('')}
        <td class="num"><strong>${r.total}</strong></td>
      </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  /* ── 5. Time-series chart — daily totals per chemical, stacked bars. ── */
  html += `<div class="card">
    <div class="card-title">Daily usage</div>
    ${renderChartHtml(readings, from, to)}
  </div>`;

  div.innerHTML = html;
}

/* Build a simple stacked-bar SVG chart of daily totals for the top 6
   chemicals. Days with zero use are still shown to keep spacing even. */
function renderChartHtml(readings, fromISO, toISO) {
  // Day-bucket the data.
  const days = [];
  const cur = new Date(fromISO + 'T00:00');
  const end = new Date(toISO   + 'T00:00');
  while (cur <= end) {
    days.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate() + 1);
  }
  const buckets = Object.fromEntries(days.map(d => [d, Object.fromEntries(CHEMS.map(c => [c.key, 0]))]));
  for (const r of readings) {
    if (!buckets[r.date]) continue;
    for (const c of CHEMS) buckets[r.date][c.key] += r.chems[c.key] || 0;
  }

  // Pick the six chemicals with the highest totals — others lumped into "Other".
  const totals = CHEMS.map(c => ({ key:c.key, label:c.label, total:days.reduce((s,d)=>s+buckets[d][c.key], 0) }));
  totals.sort((a,b) => b.total - a.total);
  const top = totals.slice(0, 6).filter(t => t.total > 0);
  const topKeys = new Set(top.map(t => t.key));
  const otherTotal = totals.slice(6).reduce((s,t)=>s+t.total, 0);

  const palette = ['#646955', '#AF926A', '#1a5276', '#a86c00', '#8B2020', '#2d6a4f', '#989782'];
  const series = top.map((t, i) => ({ key:t.key, label:t.label, colour: palette[i] || '#888' }));
  if (otherTotal > 0) series.push({ key:'__other__', label:'Other', colour: palette[series.length] || '#888' });

  // Compute max stack height for y-scale.
  const dayTotals = days.map(d => {
    let total = 0;
    for (const c of CHEMS) total += buckets[d][c.key] || 0;
    return total;
  });
  const yMax = Math.max(1, ...dayTotals);

  const W = 960, H = 220, padL = 36, padR = 12, padT = 8, padB = 26;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const barW = innerW / days.length;
  const yScale = v => innerH * (v / yMax);

  let bars = '';
  days.forEach((d, i) => {
    let yCursor = padT + innerH;
    let stackTotal = 0;
    for (const s of series) {
      let v = 0;
      if (s.key === '__other__') {
        for (const c of CHEMS) if (!topKeys.has(c.key)) v += buckets[d][c.key] || 0;
      } else {
        v = buckets[d][s.key] || 0;
      }
      if (v <= 0) continue;
      const h = yScale(v);
      yCursor -= h;
      bars += `<rect x="${padL + i*barW + barW*0.1}" y="${yCursor}" width="${barW*0.8}" height="${h}" fill="${s.colour}"><title>${d} · ${s.label}: ${v}</title></rect>`;
      stackTotal += v;
    }
    // Day label every 7 days for readability.
    if (i % 7 === 0 || i === days.length - 1) {
      bars += `<text x="${padL + i*barW + barW/2}" y="${H - 8}" text-anchor="middle" font-size="10" fill="#666">${d.slice(5)}</text>`;
    }
  });

  // Y-axis ticks (0, mid, max).
  const ticks = [0, yMax/2, yMax];
  let yAxis = '';
  for (const t of ticks) {
    const y = padT + innerH - yScale(t);
    yAxis += `<line x1="${padL}" x2="${padL+innerW}" y1="${y}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
    yAxis += `<text x="${padL-4}" y="${y+3}" text-anchor="end" font-size="10" fill="#888">${Math.round(t)}</text>`;
  }

  const legend = series.map(s =>
    `<span><span class="dot" style="background:${s.colour}"></span>${escapeHtml(s.label)}</span>`
  ).join('');

  return `<div class="chart">
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${yAxis}${bars}</svg>
    <div class="chart-legend">${legend}</div>
  </div>`;
}
