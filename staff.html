<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Be Here — My Day">
  <meta name="theme-color" content="#272F2E">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Be Here — My Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#D5D0C4; --dark:#272F2E; --sage:#646955; --sage-mid:#989782;
      --gold:#AF926A; --cream:#F3E3C3; --surface:#fff; --border:#e0ddd6;
      --red:#8B2020; --red-bg:#fdf0ec; --amber:#a86c00; --amber-bg:#fdf5e8;
      --green:#2d6a4f; --green-bg:#edf7f2; --green-bdr:#52b788;
      --sameday:#bb3354; --early:#fdab3d;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Instrument Sans',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; padding-bottom:env(safe-area-inset-bottom); }

    /* Header */
    .header { background:var(--dark); color:#fff; padding:18px 20px; padding-top:max(18px,env(safe-area-inset-top)); display:flex; align-items:center; gap:14px; }
    .header-inner { display:flex; align-items:center; gap:14px; flex:1; }
    .header-logo svg { display:block; width:110px; height:auto; }
    .header-sub { font-size:11px; color:var(--cream); opacity:0.65; margin-top:3px; letter-spacing:0.3px; }
    .hdr-logout { margin-left:auto; color:rgba(255,255,255,.6); font-size:12px; font-weight:600; background:none; border:1px solid rgba(255,255,255,.2); padding:6px 10px; border-radius:6px; cursor:pointer; font-family:inherit; }
    .hdr-logout:hover { background:rgba(255,255,255,.1); color:#fff; }

    /* Code entry */
    .code-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 80px); padding:24px; }
    .code-card { background:#fff; border-radius:20px; padding:36px 28px; max-width:360px; width:100%; box-shadow:0 10px 32px rgba(39,47,46,.15); text-align:center; }
    .code-card h1 { font-size:20px; font-weight:700; color:var(--dark); margin-bottom:6px; }
    .code-card p { font-size:13px; color:var(--sage); margin-bottom:22px; line-height:1.5; }
    .code-input { width:100%; padding:18px; font-size:28px; font-weight:700; text-align:center; letter-spacing:14px; border:2px solid var(--border); border-radius:12px; font-family:inherit; color:var(--dark); outline:none; margin-bottom:12px; }
    .code-input:focus { border-color:var(--dark); }
    .code-error { font-size:13px; color:var(--red); min-height:20px; margin-bottom:12px; font-weight:600; }
    .btn-code { width:100%; padding:14px; background:var(--dark); color:var(--cream); border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn-code:hover { background:var(--sage); }
    .btn-code:disabled { background:var(--sage-mid); cursor:not-allowed; }

    /* Day view */
    .day-wrap { padding:18px 20px 40px; max-width:560px; margin:0 auto; display:none; }
    .greeting { margin-bottom:16px; }
    .greeting-name { font-size:24px; font-weight:700; color:var(--dark); }
    .greeting-date { font-size:13px; color:var(--sage); margin-top:2px; }

    /* Day nav */
    .day-nav { display:flex; gap:8px; background:#fff; border-radius:12px; padding:6px; margin-bottom:14px; box-shadow:0 1px 3px rgba(39,47,46,.05); overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .day-chip { flex:0 0 auto; padding:10px 14px; border-radius:9px; font-size:12px; font-weight:700; color:var(--sage); cursor:pointer; border:none; background:transparent; font-family:inherit; text-align:center; min-width:58px; }
    .day-chip .d-dow { display:block; font-size:10px; opacity:.7; font-weight:600; }
    .day-chip .d-num { display:block; font-size:16px; margin-top:2px; }
    .day-chip.active { background:var(--dark); color:var(--cream); }
    .day-chip.has-work:not(.active) { background:#eeeae0; color:var(--dark); }
    .day-chip .d-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--gold); margin-left:4px; vertical-align:middle; }

    /* Section labels */
    .section-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--sage-mid); margin:20px 0 8px; display:flex; align-items:center; gap:8px; }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
    .section-label .count { color:var(--dark); background:#fff; padding:2px 8px; border-radius:10px; font-size:11px; }

    /* Shift summary */
    .shift-card { background:#fff; border-radius:12px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 3px rgba(39,47,46,.05); }
    .shift-card.leave { background:#fdf5e8; }
    .shift-icon { font-size:22px; }
    .shift-body { flex:1; }
    .shift-hours { font-size:16px; font-weight:700; color:var(--dark); }
    .shift-role { font-size:12px; color:var(--sage); margin-top:1px; }
    .shift-times { font-size:13px; color:var(--sage); font-weight:600; }

    /* Clean cards */
    .clean-card { background:#fff; border-left:5px solid var(--sage-mid); border-radius:10px; padding:14px 14px 12px; margin-bottom:10px; box-shadow:0 1px 3px rgba(39,47,46,.07); }
    .clean-card.same-day { border-left-color:var(--sameday); background:#fdf0f4; }
    .clean-card.early    { border-left-color:var(--early); background:#fdf5e8; }
    .clean-card.completed { opacity:.55; background:#f0ede4; }
    .clean-card.completed .cc-prop { text-decoration:line-through; }
    .clean-card.absorbed { opacity:.55; }
    .clean-card.absorbed .cc-prop { text-decoration:line-through; }
    .cc-top { display:flex; align-items:flex-start; gap:10px; margin-bottom:6px; }
    .cc-prop { flex:1; font-size:17px; font-weight:700; color:var(--dark); }
    .cc-badges { display:flex; gap:4px; flex-wrap:wrap; }
    .cc-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:.3px; text-transform:uppercase; }
    .cc-badge.t { background:var(--sameday); color:#fff; }
    .cc-badge.e { background:var(--early); color:#fff; }
    .cc-badge.gr { background:#3a6a2a; color:#fff; }
    .cc-badge.qc { background:#9d50dd; color:#fff; }
    .cc-badge.rf { background:#fdab3d; color:#fff; }
    .cc-badge.comp { background:var(--green); color:#fff; }
    .cc-meta { font-size:13px; color:var(--sage); margin-bottom:8px; }
    .cc-meta .role-pill { display:inline-block; padding:1px 7px; background:#eeeae0; color:var(--dark); border-radius:4px; margin-left:4px; font-size:11px; font-weight:700; }
    .cc-with { font-size:12px; color:var(--sage); margin-bottom:4px; font-style:italic; }
    .cc-notes { font-size:13px; color:var(--dark); background:#fdf5e8; padding:8px 10px; border-radius:7px; margin:6px 0 8px; line-height:1.35; }
    .cc-linked { font-size:12px; color:var(--gold); background:#fdf5e8; padding:6px 9px; border-radius:6px; margin:6px 0; font-weight:600; }
    .cc-completed-line { font-size:12px; color:var(--green); font-weight:600; margin-top:6px; }
    .cc-actions { display:flex; gap:8px; margin-top:10px; }
    .cc-btn { flex:1; padding:11px; font-size:13px; font-weight:700; border-radius:8px; border:none; cursor:pointer; font-family:inherit; text-align:center; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
    .cc-btn.primary { background:var(--dark); color:var(--cream); }
    .cc-btn.primary:hover { background:var(--sage); }
    .cc-btn.done { background:var(--green); color:#fff; }
    .cc-btn.done[disabled] { opacity:.6; cursor:not-allowed; }
    .cc-btn.secondary { background:#eeeae0; color:var(--dark); }

    /* Empty */
    .empty { background:#fff; border-radius:12px; padding:24px; text-align:center; font-size:14px; color:var(--sage-mid); font-style:italic; }

    /* Loading */
    .loading { text-align:center; padding:40px; color:var(--sage-mid); font-size:14px; }
    .spin { display:inline-block; width:22px; height:22px; border:3px solid rgba(100,105,85,.15); border-top-color:var(--sage); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Toast */
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(120px); background:var(--dark); color:var(--cream); padding:14px 22px; border-radius:28px; font-size:14px; font-weight:600; transition:transform .28s cubic-bezier(0.34,1.56,0.64,1); z-index:999; pointer-events:none; box-shadow:0 6px 18px rgba(39,47,46,.25); }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.ok { background:var(--sage); }
    .toast.err { background:var(--red); }
  </style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════════════
   Be Here — Staff personal day view
   Authenticate via 4-digit code (Staff.text_mm2qd59j), then render
   this staff member's cleans, laundry runs, checks and shift hours
   for today + 6 days ahead.
   ═══════════════════════════════════════════════════════════════════ */

const API_TOKEN  = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY0NjkyOTc2MCwiYWFpIjoxMSwidWlkIjoxMDIyMzcwODYsImlhZCI6IjIwMjYtMDQtMTdUMTA6NTQ6MzcuMDAwWiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjE0MTkxNjYwLCJyZ24iOiJldWMxIn0.22emTc6IL6ShMMn6jzWAH-50xVzI6zBA-y2Yn7EAxAE';
const STAFF_BOARD  = 5095127554;
const CLEANS_BOARD = 5095134636;
const SHIFTS_BOARD = 5095155773;

// Staff columns
const ST_CODE     = 'text_mm2qd59j';
const ST_ROLE     = 'color_mm2psadz';
const ST_STATUS   = 'color_mm2psvh2';

// Cleans columns (must stay in sync with rota-planner.html)
const CL_DATE       = 'date_mm2pphc';
const CL_CHECKIN    = 'date_mm2p6tck';
const CL_CHECKOUT   = 'date_mm2pb8rs';
const CL_PROP       = 'board_relation_mm2psy0b';
const CL_START      = 'hour_mm2pskhh';
const CL_HRS        = 'numeric_mm2pmqdt';
const CL_PRIMARY    = 'dropdown_mm2pntvm';
const CL_PARTNER    = 'dropdown_mm2pbcnq';
const CL_CHECKER    = 'dropdown_mm2p9qd3';
const CL_SAMEDAY    = 'boolean_mm2p2v4n';
const CL_LINEN_MTHD = 'color_mm2pgdm5';
const CL_LINEN_DRV  = 'dropdown_mm2pmr0f';
const CL_LINEN_DATE = 'date_mm2phz49';
const CL_DIRT_MTHD  = 'color_mm2pd9tb';
const CL_DIRT_DRV   = 'dropdown_mm2pwdwg';
const CL_LINEN_SRC  = 'board_relation_mm2pke5q';
const CL_NOTES      = 'long_text_mm2pedn3';
const CL_CHECKTYPE  = 'color_mm2pznw1';
const CL_REVIEW     = 'color_mm2q5qzp';
const CL_REVIEW_NT  = 'text_mm2qbgrt';
const CL_LINKED_REF = 'text_mm2qh78j';
const CL_LINKED_NT  = 'long_text_mm2qp4ay';
const CL_COMPLETED  = 'date_mm2qxh4a';

// Staff Shifts
const SH_STAFF = 'text_mm2p1gqx';
const SH_DATE  = 'date_mm2phk9q';
const SH_ROLE  = 'color_mm2pcrmp';
const SH_HOURS = 'numeric_mm2pawya';

const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SESSION_KEY = 'bh.staffCode';

let me = null;          // resolved staff { id, name, role }
let cleans = [];
let shifts = [];
let currentDay = null;  // yyyy-mm-dd

/* ─── Helpers ───────────────────────────────────────────────── */
function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pj(v) { if (v == null || v === '') return null; try { return typeof v === 'string' ? JSON.parse(v) : v; } catch { return null; } }
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDaysISO(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dowOf(iso) { return DOW[new Date(iso+'T00:00:00').getDay()]; }
function dayNumOf(iso) { return String(new Date(iso+'T00:00:00').getDate()); }
function prettyDate(iso) {
  const d = new Date(iso+'T00:00:00');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return `${DOW[d.getDay()]} ${d.getDate()} ${mo}`;
}

async function mondayFetch(query) {
  const r = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: { 'Content-Type':'application/json','Authorization':API_TOKEN,'API-Version':'2024-01' },
    body: JSON.stringify({ query })
  });
  const j = await r.json();
  if (j.errors) throw new Error(j.errors[0].message);
  return j.data;
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => { el.className = 'toast ' + type; }, 2600);
}

/* ─── Auth ──────────────────────────────────────────────────── */
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitCode();
});
document.getElementById('codeInput').addEventListener('input', e => {
  document.getElementById('codeError').textContent = '';
  if (e.target.value.length === 4) submitCode();
});

async function submitCode() {
  const code = (document.getElementById('codeInput').value || '').trim();
  const err = document.getElementById('codeError');
  const btn = document.getElementById('codeBtn');
  if (!/^\d{4}$/.test(code)) { err.textContent = 'Enter your 4-digit code.'; return; }
  btn.disabled = true; btn.textContent = 'Checking…';
  err.textContent = '';
  try {
    const data = await mondayFetch(`{ boards(ids:[${STAFF_BOARD}]){ items_page(limit:200){ items{
      id name column_values(ids:["${ST_CODE}","${ST_ROLE}","${ST_STATUS}"]){ id text }
    } } } }`);
    const items = data.boards?.[0]?.items_page?.items || [];
    const hit = items.find(it => (it.column_values.find(c=>c.id===ST_CODE)?.text || '').trim() === code);
    if (!hit) { err.textContent = 'Code not recognised. Double-check with the office.'; btn.disabled=false; btn.textContent='Show my day'; return; }
    me = {
      id:   hit.id,
      name: hit.name,
      role: hit.column_values.find(c=>c.id===ST_ROLE)?.text || '',
      status: hit.column_values.find(c=>c.id===ST_STATUS)?.text || ''
    };
    sessionStorage.setItem(SESSION_KEY, code);
    await boot();
  } catch (e) {
    err.textContent = 'Could not reach Monday: ' + e.message;
    btn.disabled = false; btn.textContent = 'Show my day';
  }
}

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  me = null; cleans = []; shifts = [];
  document.getElementById('dayWrap').style.display = 'none';
  document.getElementById('codeWrap').style.display = '';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('codeInput').value = '';
  document.getElementById('codeInput').focus();
}

/* ─── Boot (after auth) ─────────────────────────────────────── */
async function boot() {
  document.getElementById('codeWrap').style.display = 'none';
  document.getElementById('dayWrap').style.display = '';
  document.getElementById('logoutBtn').style.display = '';
  document.getElementById('greetingName').textContent = `Hi ${me.name}`;
  document.getElementById('greetingDate').textContent = prettyDate(todayISO());
  document.getElementById('dayContent').innerHTML = '<div class="loading"><span class="spin"></span>Loading your day…</div>';
  currentDay = todayISO();
  try {
    await Promise.all([loadCleans(), loadShifts()]);
    renderDayNav();
    renderDay();
  } catch (e) {
    document.getElementById('dayContent').innerHTML = `<div class="empty">⚠️ Could not load your day: ${escapeHtml(e.message)}</div>`;
  }
}

/* ─── Load Cleans in the visible window (today + 6 days) ───── */
async function loadCleans() {
  const startISO = todayISO();
  const endISO   = addDaysISO(startISO, 6);
  const colIds = `["${CL_DATE}","${CL_CHECKIN}","${CL_CHECKOUT}","${CL_PROP}","${CL_START}","${CL_HRS}","${CL_PRIMARY}","${CL_PARTNER}","${CL_CHECKER}","${CL_SAMEDAY}","${CL_LINEN_MTHD}","${CL_LINEN_DRV}","${CL_LINEN_DATE}","${CL_DIRT_MTHD}","${CL_DIRT_DRV}","${CL_LINEN_SRC}","${CL_NOTES}","${CL_CHECKTYPE}","${CL_REVIEW}","${CL_REVIEW_NT}","${CL_LINKED_REF}","${CL_LINKED_NT}","${CL_COMPLETED}"]`;
  // items_page_by_column_values is restrictive on date ranges; use the general query then filter client-side. Window is small (7 days × ~25 properties = manageable).
  let cursor = null, all = [];
  do {
    const q = cursor
      ? `{ next_items_page(limit:500,cursor:"${cursor}"){ cursor items{ id name column_values(ids:${colIds}){ id value text } } } }`
      : `{ boards(ids:[${CLEANS_BOARD}]){ items_page(limit:500){ cursor items{ id name column_values(ids:${colIds}){ id value text } } } } }`;
    const data = await mondayFetch(q);
    const page = cursor ? data.next_items_page : data.boards[0].items_page;
    cursor = page.cursor;
    all = all.concat(page.items || []);
  } while (cursor);

  cleans = [];
  for (const it of all) {
    const cv = Object.fromEntries(it.column_values.map(c=>[c.id, c]));
    const dateObj = pj(cv[CL_DATE]?.value);
    if (!dateObj?.date) continue;
    if (dateObj.date < startISO || dateObj.date > endISO) continue;
    const primary = (cv[CL_PRIMARY]?.text || '').split(',').map(s=>s.trim()).filter(Boolean)[0] || '';
    const partner = (cv[CL_PARTNER]?.text || '').split(',').map(s=>s.trim()).filter(Boolean)[0] || '';
    const checker = (cv[CL_CHECKER]?.text || '').split(',').map(s=>s.trim()).filter(Boolean)[0] || '';
    const linenDrv = (cv[CL_LINEN_DRV]?.text || '').split(',').map(s=>s.trim()).filter(Boolean)[0] || '';
    const dirtDrv  = (cv[CL_DIRT_DRV]?.text  || '').split(',').map(s=>s.trim()).filter(Boolean)[0] || '';
    // Filter to this staff member's jobs only
    const mine = [primary, partner, checker, linenDrv, dirtDrv].includes(me.name);
    if (!mine) continue;

    const startObj = pj(cv[CL_START]?.value);
    const start = startObj ? `${String(startObj.hour||0).padStart(2,'0')}:${String(startObj.minute||0).padStart(2,'0')}` : '';
    const checkinDate = pj(cv[CL_CHECKIN]?.value)?.date || dateObj.date;
    const checkoutDate = pj(cv[CL_CHECKOUT]?.value)?.date || '';
    const linenDate = pj(cv[CL_LINEN_DATE]?.value)?.date || '';
    const completedAt = pj(cv[CL_COMPLETED]?.value)?.date || '';
    const sameDay = !!(pj(cv[CL_SAMEDAY]?.value)?.checked);
    const propText = cv[CL_PROP]?.text || it.name;

    // My role on this clean (for display)
    const roles = [];
    if (primary === me.name) roles.push('Lead cleaner');
    if (partner === me.name) roles.push('Partner cleaner');
    if (checker === me.name) roles.push('Checker');
    if (linenDrv === me.name) roles.push('Linen drop');
    if (dirtDrv  === me.name) roles.push('Dirties pickup');

    cleans.push({
      id: it.id,
      name: it.name,
      property: propText,
      day: dateObj.date,
      checkinDate,
      checkoutDate,
      linenDate,
      start: start || '09:00',
      hours: parseFloat(pj(cv[CL_HRS]?.value)) || 0,
      primary, partner, checker, linenDrv, dirtDrv,
      linenMethod: cv[CL_LINEN_MTHD]?.text || '',
      linenSource: cv[CL_LINEN_SRC]?.text || '',
      dirtiesMethod: cv[CL_DIRT_MTHD]?.text || '',
      notes: pj(cv[CL_NOTES]?.value)?.text || cv[CL_NOTES]?.text || '',
      checkType: cv[CL_CHECKTYPE]?.text || '',
      reviewFlag: cv[CL_REVIEW]?.text || '',
      reviewNote: pj(cv[CL_REVIEW_NT]?.value) || cv[CL_REVIEW_NT]?.text || '',
      linkedRef: cv[CL_LINKED_REF]?.text || '',
      linkedNote: pj(cv[CL_LINKED_NT]?.value)?.text || cv[CL_LINKED_NT]?.text || '',
      completedAt,
      sameDay,
      early: !sameDay && !!checkinDate && dateObj.date < checkinDate,
      roles,
    });
  }
  cleans.sort((a,b) => (a.day+a.start).localeCompare(b.day+b.start));
}

/* ─── Load Shifts in the visible window ─────────────────────── */
async function loadShifts() {
  const startISO = todayISO();
  const endISO   = addDaysISO(startISO, 6);
  const colIds = `["${SH_STAFF}","${SH_DATE}","${SH_ROLE}","${SH_HOURS}"]`;
  let cursor = null, all = [];
  do {
    const q = cursor
      ? `{ next_items_page(limit:500,cursor:"${cursor}"){ cursor items{ id column_values(ids:${colIds}){ id text value } } } }`
      : `{ boards(ids:[${SHIFTS_BOARD}]){ items_page(limit:500){ cursor items{ id column_values(ids:${colIds}){ id text value } } } } }`;
    const data = await mondayFetch(q);
    const page = cursor ? data.next_items_page : data.boards[0].items_page;
    cursor = page.cursor;
    all = all.concat(page.items || []);
  } while (cursor);

  shifts = [];
  for (const it of all) {
    const cv = Object.fromEntries(it.column_values.map(c=>[c.id, c]));
    if ((cv[SH_STAFF]?.text || '').trim() !== String(me.id)) continue;
    const dateObj = pj(cv[SH_DATE]?.value);
    const date = dateObj?.date;
    if (!date || date < startISO || date > endISO) continue;
    shifts.push({
      date,
      role: cv[SH_ROLE]?.text || '',
      hours: parseFloat(pj(cv[SH_HOURS]?.value)) || 0,
    });
  }
}

/* ─── Day navigation strip ──────────────────────────────────── */
function renderDayNav() {
  const nav = document.getElementById('dayNav');
  const days = [];
  for (let i=0; i<7; i++) days.push(addDaysISO(todayISO(), i));
  nav.innerHTML = days.map(d => {
    const hasWork = cleans.some(c => c.day === d) || shifts.some(s => s.date === d && s.hours > 0);
    const cls = ['day-chip'];
    if (d === currentDay) cls.push('active');
    if (hasWork) cls.push('has-work');
    const hasLinenEarly = cleans.some(c => c.linenDate === d && c.linenDate !== c.day);
    return `<button class="${cls.join(' ')}" onclick="setDay('${d}')">
      <span class="d-dow">${DOW[new Date(d+'T00:00:00').getDay()]}${hasLinenEarly ? '<span class="d-dot" title="Linen drop"></span>' : ''}</span>
      <span class="d-num">${dayNumOf(d)}</span>
    </button>`;
  }).join('');
}

function setDay(d) {
  currentDay = d;
  renderDayNav();
  renderDay();
}

/* ─── Day rendering ─────────────────────────────────────────── */
function renderDay() {
  const day = currentDay;
  const dayShifts = shifts.filter(s => s.date === day);
  const dayCleans = cleans.filter(c => c.day === day);
  const dayLinenDrops = cleans.filter(c => c.linenDate === day && c.linenDate !== c.day); // linen-drop day, clean is another day
  const container = document.getElementById('dayContent');

  const parts = [];
  parts.push(`<div style="font-size:13px;color:var(--sage);margin-bottom:12px">${prettyDate(day)}</div>`);

  // Shift
  if (dayShifts.length) {
    parts.push('<div class="section-label">Your shift</div>');
    for (const s of dayShifts) {
      const isLeave = s.role && /leave|sick|off/i.test(s.role);
      parts.push(`<div class="shift-card${isLeave?' leave':''}">
        <div class="shift-icon">${isLeave ? '🌴' : '⏱️'}</div>
        <div class="shift-body">
          <div class="shift-hours">${isLeave ? s.role : (s.hours ? s.hours + ' hours' : 'On duty')}</div>
          <div class="shift-role">${escapeHtml(s.role || 'Standard')}</div>
        </div>
      </div>`);
    }
  } else {
    parts.push('<div class="section-label">Your shift</div><div class="empty">No shift scheduled.</div>');
  }

  // Cleans for today
  const cleansMine = dayCleans.filter(c => c.roles.some(r => /cleaner|checker/i.test(r)));
  if (cleansMine.length) {
    parts.push(`<div class="section-label">Jobs today <span class="count">${cleansMine.length}</span></div>`);
    for (const c of cleansMine) parts.push(renderCleanCard(c));
  }

  // Linen drops on a different day
  if (dayLinenDrops.length) {
    parts.push(`<div class="section-label">Linen drops <span class="count">${dayLinenDrops.length}</span></div>`);
    for (const c of dayLinenDrops) parts.push(renderLinenDropCard(c));
  }

  // Dirties pickups (happen on clean day; already in cleansMine if I'm also cleaning, otherwise show as own row)
  const dirtiesMine = dayCleans.filter(c => c.dirtDrv === me.name && !c.roles.some(r => /cleaner|checker/i.test(r)));
  if (dirtiesMine.length) {
    parts.push(`<div class="section-label">Dirties pickup <span class="count">${dirtiesMine.length}</span></div>`);
    for (const c of dirtiesMine) parts.push(renderDirtiesCard(c));
  }

  if (!dayShifts.length && !cleansMine.length && !dayLinenDrops.length && !dirtiesMine.length) {
    parts.push('<div class="empty">Nothing on your plate — enjoy the break 🌿</div>');
  }

  container.innerHTML = parts.join('');
}

function renderCleanCard(c) {
  const completed = !!c.completedAt;
  const absorbed  = !!c.linkedRef && cleanIsAbsorbed(c);
  const badges = [];
  if (completed) badges.push('<span class="cc-badge comp">✓ Done</span>');
  if (c.sameDay) badges.push('<span class="cc-badge t">T</span>');
  if (c.early && !c.sameDay) badges.push('<span class="cc-badge e">Early</span>');
  if (c.checkType === 'Guest Ready') badges.push('<span class="cc-badge gr" title="No quality check needed">GR</span>');
  if (c.checkType === 'Quality Check') badges.push('<span class="cc-badge qc">QC</span>');
  if (c.reviewFlag) badges.push(`<span class="cc-badge rf" title="${escapeHtml(c.reviewNote||'')}">⚑</span>`);

  const roleList = c.roles.length ? `<span class="role-pill">${escapeHtml(c.roles.join(' · '))}</span>` : '';
  const withList = [c.primary, c.partner].filter(n => n && n !== me.name).filter(Boolean);
  const withLine = withList.length ? `<div class="cc-with">with ${escapeHtml(withList.join(', '))}</div>` : '';

  const linkedBlock = c.linkedNote
    ? `<div class="cc-linked">🔗 ${escapeHtml(c.linkedNote)}</div>`
    : (c.linkedRef ? `<div class="cc-linked">🔗 Linked booking — treat as contiguous break</div>` : '');

  const notesBlock = c.notes ? `<div class="cc-notes">${escapeHtml(c.notes)}</div>` : '';

  // Action: Mark complete → open changeover-form prefilled
  const formUrl = `changeover-form.html?clean_id=${encodeURIComponent(c.id)}&property=${encodeURIComponent(c.property)}&date=${encodeURIComponent(c.day)}&name=${encodeURIComponent(me.name)}&act=cleaned`;
  const canComplete = !completed && !absorbed && c.roles.some(r => /cleaner/i.test(r));

  let completedLine = '';
  if (completed) completedLine = `<div class="cc-completed-line">✓ Completed ${escapeHtml(c.completedAt)}</div>`;

  const actionsBtns = [];
  if (canComplete) {
    actionsBtns.push(`<a class="cc-btn primary" href="${formUrl}">✓ Mark complete</a>`);
  } else if (c.roles.some(r => /checker/i.test(r))) {
    actionsBtns.push(`<a class="cc-btn secondary" href="checker.html">Open checker</a>`);
  }

  return `<div class="clean-card${c.sameDay?' same-day':''}${c.early && !c.sameDay?' early':''}${completed?' completed':''}${absorbed?' absorbed':''}">
    <div class="cc-top"><div class="cc-prop">${escapeHtml(c.property)}</div>
      <div class="cc-badges">${badges.join('')}</div></div>
    <div class="cc-meta">${escapeHtml(c.start)}${c.hours?` · ${c.hours}h`:''}${roleList}</div>
    ${withLine}
    ${linkedBlock}
    ${notesBlock}
    ${completedLine}
    ${actionsBtns.length ? `<div class="cc-actions">${actionsBtns.join('')}</div>` : ''}
  </div>`;
}

function renderLinenDropCard(c) {
  return `<div class="clean-card" style="border-left-color:var(--gold)">
    <div class="cc-top"><div class="cc-prop">🧺 Linen drop → ${escapeHtml(c.property)}</div></div>
    <div class="cc-meta">Drop-off for clean on ${escapeHtml(prettyDate(c.day))}${c.linenSource?` · from ${escapeHtml(c.linenSource)}`:''}</div>
    ${c.notes ? `<div class="cc-notes">${escapeHtml(c.notes)}</div>` : ''}
  </div>`;
}

function renderDirtiesCard(c) {
  return `<div class="clean-card" style="border-left-color:var(--sage-mid)">
    <div class="cc-top"><div class="cc-prop">🧺 Dirties pickup ← ${escapeHtml(c.property)}</div></div>
    <div class="cc-meta">After clean · ${escapeHtml(c.start||'')}</div>
  </div>`;
}

/* Linked-pair suppression — whichever clean has the LATER check-in
   is considered the "absorbed" ghost (the guest is still in situ). */
function cleanIsAbsorbed(c) {
  if (!c.linkedRef) return false;
  const partner = cleans.find(o => o.id === c.linkedRef);
  if (!partner) return false;
  return c.checkinDate && partner.checkinDate && c.checkinDate > partner.checkinDate;
}

/* ─── Boot: restore code from session if present ─────────────── */
(async function restore() {
  const saved = sessionStorage.getItem(SESSION_KEY);
  if (saved && /^\d{4}$/.test(saved)) {
    document.getElementById('codeInput').value = saved;
    submitCode();
  } else {
    setTimeout(() => document.getElementById('codeInput').focus(), 100);
  }
})();

/* ─── Service worker ─────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
