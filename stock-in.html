<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Be Here — Stock In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#D5D0C4; --dark:#272F2E; --sage:#646955; --sage-mid:#989782;
      --gold:#AF926A; --cream:#F3E3C3; --surface:#fff; --border:#e0ddd6;
      --red:#8B2020; --red-bg:#fdf0ec; --amber:#a86c00; --amber-bg:#fdf5e8;
      --green:#2d6a4f; --green-bg:#edf7f2;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      font-family:'Instrument Sans',-apple-system,sans-serif;
      background:var(--bg); color:var(--dark); min-height:100vh;
      padding-bottom:calc(32px + env(safe-area-inset-bottom));
    }

    /* ── Header ── */
    header {
      background:var(--dark); color:#fff;
      padding:16px 20px; padding-top:max(16px,env(safe-area-inset-top));
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .hdr-left { display:flex; align-items:center; gap:14px; }
    .hdr-title { font-size:17px; font-weight:700; }
    .hdr-sub { font-size:10px; color:rgba(255,255,255,.45); margin-top:2px; letter-spacing:.3px; }
    .hdr-hub {
      color:rgba(255,255,255,.6); font-size:12px; font-weight:600;
      text-decoration:none; padding:5px 10px;
      border:1px solid rgba(255,255,255,.2); border-radius:6px; white-space:nowrap;
    }
    .hdr-hub:hover { background:rgba(255,255,255,.1); color:#fff; }

    /* ── Load bar ── */
    .load-bar {
      background:#1e2522; padding:8px 20px;
      display:flex; align-items:center; gap:12px;
    }
    .load-btn {
      padding:6px 16px; background:var(--cream); color:var(--dark);
      border:none; border-radius:6px; font-size:12px; font-weight:600;
      cursor:pointer; font-family:inherit;
    }
    .load-btn:hover { opacity:.85; }
    .load-btn:disabled { opacity:.5; cursor:not-allowed; }
    .load-status { font-size:12px; color:rgba(255,255,255,.7); flex:1; }

    /* ── Filter tabs ── */
    .tabs {
      padding:14px 20px 0; display:flex; gap:8px; overflow-x:auto;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar { display:none; }
    .tab {
      padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600;
      border:1.5px solid var(--border); background:var(--surface); color:var(--sage-mid);
      cursor:pointer; white-space:nowrap; font-family:inherit;
    }
    .tab.active { background:var(--dark); color:#fff; border-color:var(--dark); }

    /* ── Search ── */
    .search-wrap { padding:12px 20px 8px; }
    .search-input {
      width:100%; padding:10px 14px; border:1.5px solid var(--border);
      border-radius:10px; background:var(--surface); color:var(--dark);
      font-size:14px; font-family:inherit; outline:none;
    }
    .search-input:focus { border-color:var(--dark); }

    /* ── Content ── */
    .content { padding:8px 20px 20px; }
    .sec-lbl {
      font-size:11px; font-weight:700; text-transform:uppercase;
      letter-spacing:.6px; color:var(--sage-mid); margin:18px 0 8px;
      display:flex; align-items:center; gap:8px;
    }
    .sec-lbl::after { content:''; flex:1; height:1px; background:var(--border); }
    .sec-lbl span { background:var(--bg); padding-right:0; }

    /* ── Item card ── */
    .item-card {
      background:var(--surface); border-radius:12px; padding:14px 16px;
      margin-bottom:8px; display:flex; align-items:center; gap:14px;
      box-shadow:0 1px 3px rgba(39,47,46,.07);
      border-left:4px solid var(--border);
      cursor:pointer; transition:box-shadow .15s;
      -webkit-user-select:none; user-select:none;
    }
    .item-card:hover { box-shadow:0 3px 10px rgba(39,47,46,.13); }
    .item-card:active { transform:scale(.98); }
    .item-card.low  { border-left-color:var(--amber); }
    .item-card.zero { border-left-color:var(--red); }
    .item-info { flex:1; min-width:0; }
    .item-name { font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-meta { font-size:12px; color:var(--sage-mid); margin-top:3px; }
    .item-tags { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
    .tag {
      display:inline-block; font-size:10px; font-weight:700;
      padding:2px 8px; border-radius:8px; text-transform:uppercase; letter-spacing:.3px;
    }
    .tag-low  { background:var(--amber-bg); color:var(--amber); }
    .tag-zero { background:var(--red-bg); color:var(--red); }
    .tag-loc  { background:#eaede4; color:var(--sage); }
    .stock-badge {
      text-align:center; min-width:52px;
    }
    .stock-num {
      font-size:26px; font-weight:700; letter-spacing:-1px; line-height:1;
      color:var(--dark);
    }
    .stock-num.low  { color:var(--amber); }
    .stock-num.zero { color:var(--red); }
    .stock-unit { font-size:10px; color:var(--sage-mid); text-transform:uppercase; letter-spacing:.3px; margin-top:2px; }
    .add-pill {
      background:var(--dark); color:var(--cream);
      border-radius:8px; padding:10px 14px;
      font-size:13px; font-weight:700; white-space:nowrap;
      flex-shrink:0;
    }

    /* ── Empty / loading ── */
    .empty { text-align:center; padding:60px 20px; color:var(--sage-mid); font-size:15px; }

    /* ── Bottom sheet modal ── */
    .overlay {
      position:fixed; inset:0; background:rgba(39,47,46,.55);
      z-index:200; display:flex; align-items:flex-end; justify-content:center;
    }
    .sheet {
      background:var(--surface); border-radius:20px 20px 0 0;
      padding:8px 24px calc(32px + env(safe-area-inset-bottom));
      width:100%; max-width:480px;
      animation:slideUp .22s cubic-bezier(.25,.8,.25,1);
    }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .sheet-handle { width:40px; height:4px; background:#ddd; border-radius:2px; margin:8px auto 20px; }
    .sheet-title { font-size:18px; font-weight:700; margin-bottom:2px; }
    .sheet-sub { font-size:13px; color:var(--sage); margin-bottom:20px; }

    .current-stock-pill {
      background:#f5f2ed; border-radius:10px; padding:12px 16px;
      margin-bottom:18px; display:flex; align-items:center; gap:12px;
    }
    .cs-label { font-size:12px; color:var(--sage-mid); font-weight:600; text-transform:uppercase; letter-spacing:.4px; flex:1; }
    .cs-value { font-size:24px; font-weight:700; color:var(--dark); }

    .fld { margin-bottom:16px; }
    .fld label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--sage-mid); margin-bottom:8px; }

    /* Big quantity stepper */
    .qty-stepper { display:flex; align-items:center; gap:12px; }
    .qty-btn {
      width:48px; height:48px; border-radius:12px; border:1.5px solid var(--border);
      background:var(--surface); color:var(--dark); font-size:24px; font-weight:300;
      cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .qty-btn:active { background:#f0eeea; }
    .qty-input {
      flex:1; text-align:center; padding:10px;
      border:1.5px solid var(--border); border-radius:10px;
      background:var(--surface); color:var(--dark); font-size:28px; font-weight:700;
      font-family:inherit; outline:none;
    }
    .qty-input:focus { border-color:var(--dark); }

    .quick-qtys { display:flex; gap:8px; margin-top:8px; }
    .quick-qty {
      flex:1; padding:8px 0; border:1.5px solid var(--border); border-radius:8px;
      background:var(--surface); color:var(--dark); font-size:14px; font-weight:600;
      cursor:pointer; font-family:inherit; text-align:center;
    }
    .quick-qty:hover { background:#f5f2ed; }

    .fld textarea {
      width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px;
      background:var(--surface); color:var(--dark); font-size:14px;
      font-family:inherit; outline:none; resize:none; height:64px;
    }
    .fld textarea:focus { border-color:var(--dark); }

    .new-total-preview {
      background:#eaede4; border-radius:8px; padding:10px 14px;
      font-size:13px; color:var(--sage); margin-bottom:16px; display:none;
    }
    .new-total-preview strong { color:var(--dark); }

    .sheet-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
    .btn-cancel {
      padding:13px; background:transparent; border:1.5px solid var(--border);
      color:var(--sage); border-radius:10px; font-size:15px; font-weight:600;
      cursor:pointer; font-family:inherit;
    }
    .btn-confirm {
      padding:13px; background:var(--dark); color:var(--cream);
      border:none; border-radius:10px; font-size:15px; font-weight:700;
      cursor:pointer; font-family:inherit;
    }
    .btn-confirm:hover { background:var(--sage); }
    .btn-confirm:disabled { opacity:.5; cursor:not-allowed; }
    .sheet-err { font-size:12px; color:var(--red); min-height:18px; margin-top:6px; }

    /* ── Toast ── */
    .toast {
      position:fixed; bottom:calc(24px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--dark); color:#fff; padding:12px 24px; border-radius:30px;
      font-size:14px; font-weight:600; opacity:0; transition:opacity .25s, transform .25s;
      z-index:9999; white-space:nowrap; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <header>
    <div class="hdr-left">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 215.0001 45.6329" height="26" fill="#fff" aria-label="Be Here">

      <div>
        <div class="hdr-title">Stock In</div>
        <div class="hdr-sub">Record goods received</div>
      </div>
    </div>
    <a href="hub.html" class="hdr-hub">← Hub</a>
  </header>

  <div class="load-bar">
    <button class="load-btn" id="loadBtn" onclick="loadItems()">Load stock list</button>
    <div class="load-status" id="loadStatus">Tap to load current stock levels</div>
  </div>

  <div class="tabs" id="tabs" style="display:none">
    <button class="tab active" onclick="setFilter('all',this)">All items</button>
    <button class="tab" onclick="setFilter('low',this)">⚠️ Low stock</button>
    <button class="tab" onclick="setFilter('Guest',this)">Guest</button>
    <button class="tab" onclick="setFilter('Cleaning',this)">Cleaning</button>
    <button class="tab" onclick="setFilter('hub',this)">The Hub</button>
    <button class="tab" onclick="setFilter('horseshoe',this)">Little Horseshoe</button>
  </div>

  <div class="search-wrap" id="searchWrap" style="display:none">
    <input class="search-input" type="search" id="searchBox" placeholder="Search items…" oninput="renderList()" autocomplete="off">
  </div>

  <div class="content" id="content">
    <div class="empty" id="emptyMsg">Tap "Load stock list" to get started</div>
  </div>

  <!-- Goods received bottom sheet -->
  <div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeSheet()">
    <div class="sheet" id="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sheetTitle">Item</div>
      <div class="sheet-sub" id="sheetSub"></div>

      <div class="current-stock-pill">
        <div class="cs-label">Current stock</div>
        <div class="cs-value" id="sheetCurrentStock">—</div>
      </div>

      <div class="fld">
        <label>Quantity received</label>
        <div class="qty-stepper">
          <button class="qty-btn" onclick="adjustQty(-1)">−</button>
          <input class="qty-input" type="number" id="qtyInput" min="1" value="1" oninput="updatePreview()">
          <button class="qty-btn" onclick="adjustQty(1)">+</button>
        </div>
        <div class="quick-qtys">
          <button class="quick-qty" onclick="setQty(6)">6</button>
          <button class="quick-qty" onclick="setQty(12)">12</button>
          <button class="quick-qty" onclick="setQty(24)">24</button>
          <button class="quick-qty" onclick="setQty(48)">48</button>
        </div>
      </div>

      <div class="new-total-preview" id="previewPill">
        New stock total: <strong id="previewTotal">—</strong>
      </div>

      <div class="fld">
        <label>Notes (optional)</label>
        <textarea id="notesInput" placeholder="e.g. Arrived with delivery ref #1234, damaged box noted…"></textarea>
      </div>

      <div class="sheet-btns">
        <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
        <button class="btn-confirm" id="confirmBtn" onclick="confirmReceive()">✓ Confirm Received</button>
      </div>
      <div class="sheet-err" id="sheetErr"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const MONDAY_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY0NjkyOTc2MCwiYWFpIjoxMSwidWlkIjoxMDIyMzcwODYsImlhZCI6IjIwMjYtMDQtMTdUMTA6NTQ6MzcuMDAwWiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjE0MTkxNjYwLCJyZ24iOiJldWMxIn0.22emTc6IL6ShMMn6jzWAH-50xVzI6zBA-y2Yn7EAxAE';
    const STOCK_BOARD = 5094763973;
    const COL = {
      stock:    'numeric_mm2fmsjb',
      reorder:  'numeric_mm2f8xtv',
      location: 'color_mm2f8rh0',
      category: 'color_mm2fx0zz',
      notes:    'text_mm2frxg5',
    };

    let allItems = [];
    let activeFilter = 'all';
    let activeItemId = null;

    // ── Monday fetch helper ──
    async function mq(query, vars = {}) {
      const res = await fetch('https://api.monday.com/v2', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': MONDAY_TOKEN,
          'API-Version': '2024-01',
        },
        body: JSON.stringify({ query, variables: vars }),
      });
      const j = await res.json();
      if (j.errors) throw new Error(j.errors[0]?.message || 'API error');
      return j.data;
    }

    // ── Parse colour column (Monday returns label text or index) ──
    function parseColourLabel(raw) {
      if (!raw) return '';
      try {
        const p = JSON.parse(raw);
        // Monday.com colour column: { "index": N, "label": "..." } or just { "text": "..." }
        return (p.label || p.text || '').trim();
      } catch {
        return String(raw).trim();
      }
    }

    function parseNumeric(raw) {
      if (!raw) return 0;
      try { const p = JSON.parse(raw); return typeof p === 'number' ? p : parseFloat(p) || 0; }
      catch { return parseFloat(raw) || 0; }
    }

    // ── Load stock items ──
    async function loadItems() {
      const btn = document.getElementById('loadBtn');
      const status = document.getElementById('loadStatus');
      btn.disabled = true;
      btn.textContent = 'Loading…';
      status.textContent = 'Fetching stock list from Monday.com…';
      try {
        const data = await mq(`{
          boards(ids: [${STOCK_BOARD}]) {
            items_page(limit: 500) {
              items {
                id
                name
                column_values(ids: ["${COL.stock}","${COL.reorder}","${COL.location}","${COL.category}","${COL.notes}"]) {
                  id value
                }
              }
            }
          }
        }`);

        const items = data.boards[0].items_page.items;
        allItems = items.map(it => {
          const cv = {};
          for (const c of it.column_values) cv[c.id] = c.value;
          const stock   = parseNumeric(cv[COL.stock]);
          const reorder = parseNumeric(cv[COL.reorder]);
          const location = parseColourLabel(cv[COL.location]);
          const category = parseColourLabel(cv[COL.category]);
          return { id: it.id, name: it.name, stock, reorder, location, category };
        }).sort((a, b) => a.name.localeCompare(b.name));

        status.textContent = `${allItems.length} items loaded`;
        btn.textContent = 'Refresh';
        btn.disabled = false;
        document.getElementById('tabs').style.display = 'flex';
        document.getElementById('searchWrap').style.display = 'block';
        renderList();
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        btn.textContent = 'Retry';
        btn.disabled = false;
      }
    }

    // ── Filtering & search ──
    function setFilter(f, el) {
      activeFilter = f;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (el) el.classList.add('active');
      renderList();
    }

    function filterItems() {
      const q = (document.getElementById('searchBox')?.value || '').toLowerCase().trim();
      return allItems.filter(it => {
        if (q && !it.name.toLowerCase().includes(q)) return false;
        if (activeFilter === 'all') return true;
        if (activeFilter === 'low') return it.stock <= it.reorder;
        if (activeFilter === 'Guest') return it.category === 'Guest';
        if (activeFilter === 'Cleaning') return it.category === 'Cleaning';
        if (activeFilter === 'hub') return it.location === 'The Hub' || it.location === 'Both';
        if (activeFilter === 'horseshoe') return it.location === 'Little Horseshoe' || it.location === 'Both';
        return true;
      });
    }

    function stockClass(it) {
      if (it.stock === 0) return 'zero';
      if (it.reorder > 0 && it.stock <= it.reorder) return 'low';
      return '';
    }

    // ── Render list ──
    function renderList() {
      const items = filterItems();
      const content = document.getElementById('content');

      if (!items.length) {
        content.innerHTML = '<div class="empty">No items match this filter</div>';
        return;
      }

      // Group by category
      const groups = {};
      for (const it of items) {
        const grp = it.category || 'Other';
        if (!groups[grp]) groups[grp] = [];
        groups[grp].push(it);
      }

      let html = '';
      const groupOrder = ['Guest', 'Cleaning', 'Both', 'Other'];
      const sortedGroups = [
        ...groupOrder.filter(g => groups[g]),
        ...Object.keys(groups).filter(g => !groupOrder.includes(g)),
      ];

      // If only one group (or filter is category-specific), skip headers
      const showHeaders = sortedGroups.length > 1 && !['Guest','Cleaning'].includes(activeFilter);

      for (const grp of sortedGroups) {
        if (showHeaders) {
          html += `<div class="sec-lbl"><span>${grp}</span></div>`;
        }
        for (const it of groups[grp]) {
          const sc = stockClass(it);
          const tags = [];
          if (sc === 'zero') tags.push(`<span class="tag tag-zero">Out of stock</span>`);
          else if (sc === 'low') tags.push(`<span class="tag tag-low">Low — reorder at ${it.reorder}</span>`);
          if (it.location) tags.push(`<span class="tag tag-loc">${it.location}</span>`);

          html += `
            <div class="item-card ${sc}" onclick="openSheet('${it.id}')">
              <div class="stock-badge">
                <div class="stock-num ${sc}">${it.stock}</div>
                <div class="stock-unit">in stock</div>
              </div>
              <div class="item-info">
                <div class="item-name">${it.name}</div>
                ${it.reorder > 0 ? `<div class="item-meta">Reorder at: ${it.reorder}</div>` : ''}
                ${tags.length ? `<div class="item-tags">${tags.join('')}</div>` : ''}
              </div>
              <div class="add-pill">+ Add</div>
            </div>`;
        }
      }

      content.innerHTML = html;
    }

    // ── Sheet open/close ──
    function openSheet(itemId) {
      const it = allItems.find(i => i.id === itemId);
      if (!it) return;
      activeItemId = itemId;

      document.getElementById('sheetTitle').textContent = it.name;
      document.getElementById('sheetSub').textContent = `${it.category || 'Item'} · ${it.location || 'All locations'}`;
      document.getElementById('sheetCurrentStock').textContent = it.stock;
      document.getElementById('qtyInput').value = 1;
      document.getElementById('notesInput').value = '';
      document.getElementById('sheetErr').textContent = '';
      document.getElementById('confirmBtn').disabled = false;
      document.getElementById('confirmBtn').textContent = '✓ Confirm Received';
      updatePreview();
      document.getElementById('overlay').style.display = 'flex';
      setTimeout(() => document.getElementById('qtyInput').focus(), 300);
    }

    function closeSheet() {
      document.getElementById('overlay').style.display = 'none';
      activeItemId = null;
    }

    function adjustQty(delta) {
      const input = document.getElementById('qtyInput');
      const v = parseInt(input.value) || 0;
      input.value = Math.max(1, v + delta);
      updatePreview();
    }

    function setQty(n) {
      document.getElementById('qtyInput').value = n;
      updatePreview();
    }

    function updatePreview() {
      const it = allItems.find(i => i.id === activeItemId);
      if (!it) return;
      const qty = parseInt(document.getElementById('qtyInput').value) || 0;
      const preview = document.getElementById('previewPill');
      const previewTotal = document.getElementById('previewTotal');
      if (qty > 0) {
        previewTotal.textContent = it.stock + qty;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    }

    // ── Confirm receive ──
    async function confirmReceive() {
      const it = allItems.find(i => i.id === activeItemId);
      if (!it) return;
      const qty = parseInt(document.getElementById('qtyInput').value) || 0;
      if (qty < 1) { document.getElementById('sheetErr').textContent = 'Please enter a quantity of at least 1'; return; }

      const btn = document.getElementById('confirmBtn');
      btn.disabled = true;
      btn.textContent = 'Saving…';
      document.getElementById('sheetErr').textContent = '';

      const newStock = it.stock + qty;
      const notes = document.getElementById('notesInput').value.trim();
      const noteText = notes
        ? `Stock in: +${qty} received (new total: ${newStock}). ${notes}`
        : `Stock in: +${qty} received (new total: ${newStock}).`;

      try {
        // Update stock count
        await mq(
          `mutation($b:ID!,$i:ID!,$c:String!,$v:JSON!){change_column_value(board_id:$b,item_id:$i,column_id:$c,value:$v){id}}`,
          { b: String(STOCK_BOARD), i: it.id, c: COL.stock, v: String(newStock) }
        );
        // Add update note
        await mq(
          `mutation($i:ID!,$b:String!){create_update(item_id:$i,body:$b){id}}`,
          { i: it.id, b: noteText }
        );

        // Update local state
        it.stock = newStock;
        closeSheet();
        renderList();
        showToast(`✓ ${it.name} — +${qty} added (now ${newStock})`);
      } catch (e) {
        document.getElementById('sheetErr').textContent = 'Error saving: ' + e.message;
        btn.disabled = false;
        btn.textContent = '✓ Confirm Received';
      }
    }

    // ── Toast ──
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3200);
    }

    // ── Keyboard: close on Escape ──
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeSheet();
    });
  </script>
</body>
</html>
