<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Be Here — Supplies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #D5D0C4;
      --dark:     #272F2E;
      --sage:     #646955;
      --sage-mid: #989782;
      --gold:     #AF926A;
      --cream:    #F3E3C3;
      --surface:  #fff;
      --border:   #e0ddd6;
      --text:     #272F2E;
      --red:      #8B2020;
      --amber:    #a86c00;
      --green:    #3a6b4a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Instrument Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    .hdr { background: var(--dark); color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .hdr-back { background: none; border: none; color: rgba(255,255,255,.7); font-size: 22px; cursor: pointer; padding: 0 6px 0 0; line-height: 1; display: none; }
    .hdr-back.visible { display: block; }
    .hdr-logo { width: 80px; flex-shrink: 0; }
    .hdr-logo svg { display: block; width: 100%; height: auto; }
    .hdr-title { flex: 1; }
    .hdr-title-main { font-size: 15px; font-weight: 700; color: #fff; }
    .hdr-title-sub  { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 1px; }
    .hdr-refresh { background: rgba(255,255,255,.12); border: none; color: rgba(255,255,255,.8); font-size: 13px; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .hdr-refresh:hover { background: rgba(255,255,255,.2); }

    /* ── Layout ── */
    .view { padding: 18px 20px 32px; }
    .view.hidden { display: none; }

    /* ── Section heads ── */
    .sh { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--sage-mid); margin: 20px 0 8px; }
    .sh:first-child { margin-top: 0; }
    .sh-note { font-size: 12px; color: var(--sage-mid); margin-bottom: 16px; font-weight: 400; text-transform: none; letter-spacing: 0; }

    /* ── Critical banner ── */
    .crit-banner { background: var(--red); color: #fff; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .crit-banner-num { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
    .crit-banner-lbl { font-size: 13px; font-weight: 600; }
    .crit-banner-sub { font-size: 11px; opacity: .8; margin-top: 2px; }

    /* ── Lodge cards (home) ── */
    .lodge-card { background: var(--surface); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; cursor: pointer; border-left: 5px solid var(--border); transition: box-shadow .15s; box-shadow: 0 1px 3px rgba(39,47,46,.07); }
    .lodge-card:hover { box-shadow: 0 3px 10px rgba(39,47,46,.13); }
    .lodge-card.p-critical { border-left-color: var(--red); }
    .lodge-card.p-high     { border-left-color: var(--amber); }
    .lodge-card.p-medium   { border-left-color: #7a6b00; }
    .lodge-card.p-low      { border-left-color: var(--sage); }
    .lc-body { flex: 1; min-width: 0; }
    .lc-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .lc-arrival { font-size: 12px; color: var(--sage); font-weight: 600; margin-top: 2px; }
    .lc-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .tag { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .tag-crit    { background: #fdf0ec; color: var(--red); }
    .tag-overdue { background: #fdf5e8; color: var(--amber); }
    .tag-high    { background: #fdf5e8; color: var(--amber); }
    .tag-ok      { background: #eaede4; color: var(--sage); }
    .lc-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
    .lc-count { font-size: 26px; font-weight: 700; letter-spacing: -1px; color: var(--text); }
    .lc-count-lbl { font-size: 10px; color: var(--sage-mid); text-transform: uppercase; }
    .lc-arrow { font-size: 20px; color: var(--sage-mid); display: block; margin-top: 2px; }

    /* ── Any-lodge picker ── */
    .any-lodge-wrap { background: var(--surface); border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 3px rgba(39,47,46,.07); }
    .any-lodge-wrap label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--sage-mid); display: block; margin-bottom: 8px; }
    .any-lodge-select { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
    .any-lodge-select:focus { border-color: var(--gold); }

    /* ── Arrival banner (detail) ── */
    .arr-banner { background: #f5efe8; border: 1.5px solid #d4b080; border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: var(--amber); font-weight: 600; }

    /* ── Priority group headers (detail) ── */
    .prio-head { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; padding: 10px 0 6px; }
    .prio-head-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .prio-dot-critical { background: var(--red); }
    .prio-dot-high     { background: var(--amber); }
    .prio-dot-medium   { background: #7a6b00; }
    .prio-dot-low      { background: var(--sage); }
    .prio-head-label-critical { color: var(--red); }
    .prio-head-label-high     { color: var(--amber); }
    .prio-head-label-medium   { color: #7a6b00; }
    .prio-head-label-low      { color: var(--sage); }
    .prio-head-count { color: var(--sage-mid); font-weight: 400; font-size: 11px; text-transform: none; letter-spacing: 0; margin-left: auto; }

    /* ── Item rows (detail) ── */
    .item-row { background: var(--surface); border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; border-left: 4px solid var(--border); transition: opacity .2s, border-color .15s; box-shadow: 0 1px 3px rgba(39,47,46,.06); }
    .item-row.p-critical { border-left-color: var(--red); }
    .item-row.p-high     { border-left-color: var(--amber); }
    .item-row.p-medium   { border-left-color: #7a6b00; }
    .item-row.p-low      { border-left-color: var(--sage); }
    .item-row.overdue    { background: #fefcf8; }
    .item-row.checked    { opacity: .45; }
    .item-chk { width: 20px; height: 20px; accent-color: var(--sage); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .item-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 4px; }
    .item-qty  { font-size: 12px; color: var(--sage-mid); font-weight: 600; }
    .age-ok      { font-size: 11px; color: var(--sage-mid); }
    .age-overdue { font-size: 11px; color: var(--amber); font-weight: 700; }
    .item-notes  { font-size: 12px; color: var(--sage-mid); margin-top: 4px; font-style: italic; }

    /* priority pills */
    .pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: .3px; }
    .pill-critical { background: #fdf0ec; color: var(--red); }
    .pill-high     { background: #fdf5e8; color: var(--amber); }
    .pill-medium   { background: #f5f2d0; color: #7a6b00; }
    .pill-low      { background: #eaede4; color: var(--sage); }

    /* ── Deliver actions ── */
    .deliver-zone { background: var(--surface); border-radius: 12px; padding: 16px; margin-top: 14px; box-shadow: 0 1px 3px rgba(39,47,46,.07); }
    .action-btns { display: flex; gap: 8px; margin-bottom: 10px; }
    .btn-sm { flex: 1; padding: 8px; border: 1.5px solid var(--border); border-radius: 8px; background: transparent; font-size: 13px; font-weight: 600; color: var(--sage); cursor: pointer; font-family: inherit; }
    .btn-sm:hover { border-color: var(--sage); }
    .btn-deliver { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--sage); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-deliver:hover { background: #556048; }
    .btn-deliver:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Log shortage ── */
    .log-toggle { width: 100%; padding: 12px 16px; background: var(--bg); border: 1.5px dashed var(--sage-mid); border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--sage); cursor: pointer; font-family: inherit; text-align: center; margin-top: 12px; }
    .log-toggle:hover { border-color: var(--sage); }
    .log-panel { background: var(--surface); border-radius: 12px; padding: 16px; margin-top: 8px; box-shadow: 0 1px 3px rgba(39,47,46,.07); display: none; }
    .log-panel.open { display: block; }
    .log-panel h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--sage-mid); margin-bottom: 12px; }
    .fld { margin-bottom: 12px; }
    .fld label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--sage-mid); margin-bottom: 5px; }
    .fld select, .fld input, .fld textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
    .fld select:focus, .fld input:focus, .fld textarea:focus { border-color: var(--gold); }
    .fld textarea { resize: vertical; min-height: 56px; }
    .fld-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .other-warn { background: #fdf5e8; border: 1.5px solid #c8a060; border-radius: 7px; padding: 8px 10px; font-size: 12px; color: #7a4a10; margin-top: 6px; display: none; }
    .other-warn.show { display: block; }
    .btn-submit { width: 100%; padding: 11px; border: none; border-radius: 8px; background: var(--dark); color: var(--cream); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px; }
    .btn-submit:hover { background: var(--sage); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Misc ── */
    .empty { text-align: center; padding: 48px 20px; color: var(--sage-mid); font-size: 14px; }
    .loading { text-align: center; padding: 40px 20px; color: var(--sage-mid); font-size: 14px; }
    .spin { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(100,105,85,.2); border-top-color: var(--sage); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--dark); color: var(--cream); border-radius: 10px; padding: 12px 20px; font-size: 13px; font-weight: 600; z-index: 9999; transition: transform .3s; white-space: nowrap; pointer-events: none; box-shadow: 0 6px 20px rgba(39,47,46,.25); }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok  { background: var(--sage); }
    .toast.err { background: var(--red); }

    .detail-meta { font-size: 13px; color: var(--sage-mid); margin-bottom: 4px; }
  </style>
</head>
<body>

</div>

<!-- HOME VIEW -->
<div class="view" id="view-home">
  <div class="loading"><span class="spin"></span>Loading…</div>
</div>

<!-- DETAIL VIEW -->
<div class="view hidden" id="view-detail"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const MONDAY_TOKEN      = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY0NTg1MTIxMiwiYWFpIjoxMSwidWlkIjoxMDIyMzcwODYsImlhZCI6IjIwMjYtMDQtMTVUMDg6NTM6MTkuMzQxWiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjE0MTkxNjYwLCJyZ24iOiJldWMxIn0.AnJa58nVNbSv1Ydgf8BVmIBY4zoN4rOgl7IAKs51RtA';
const ARRIVALS_BOARD    = 5094453064;
const SUPPLIES_BOARD    = 1615688857;
const SUP_GROUP         = 'topics';
const CHARGEABLE_GROUP  = 'new_group64916__1';
const OVERDUE_DAYS      = 7;   // flag items older than this many days

const LODGES = ['Aintree','Ardross','Arlington Both','At Waters Edge','Badgers Sett','Beaver Brook','Berry Farm Barn','Boathouse','Cheltenham','Duck House','Egret','Epsom','Essitone House','Firefly','Foxes Den','Goodwood','Goose Landing','Green Haven','Grebe Lodge','Hideaway','Hill View','Homestead','Horseshoe Cottage','Island','Kingfisher','Lake House','Libelle','Little Horseshoe Lake','Malachite','Mallard','Maricor','Mayflower','Mirrors Edge','Newmarket','Pond','Rabbits Warren','Serendipity','Serenity','Squirrels Drey','Still Waters','Summer Lake','Swans Rest','The Atelier','The Barn','The Lookout','Tranquility','Waterlily','Willow','York'].sort();

const SUPPLY_ITEMS = ['Alcohol Beer/Ale/Cider','Alcohol Prosecco','Ant Trap','Barbecue Brush','Barbecue Cleaner','Battery AA','Battery AAA','Battery Box','Bin bags 20','Bin bags 50','Bulb Extractor Fan','Cake','Cleaner Kitchen Method','Cleaner Toilet Ecover','Coffee Pods','Coffee Tin Instant','Dishwasher Rinse Aid','Dishwasher Salt','Dishwasher Tablets','Dog Treats','Elemis bath and Shower Gel Small','Elemis bath and shower gel Large','Elemis Conditioner Large','Elemis Conditioner Small','Elemis hand and Body Wash Large','Elemis Hand and Body wash Small','Elemis Shampoo Large','Elemis Shampoo Small','Feedback Forms','Glass Flute','Glass Pint','Glass Short','Glass Tall','Glass Wine','Hand soap pouch Bayliss and Harding','Hob spray Tesco','Kitchen Rolls','Light bulb bayonet','Light bulb Screw','Matches','Milk','Napkins Tesco','Olive oil Olivio 500ml','Olive Oil Tesco 500ml','Olive oil Tesco','Pen','Peppercorns','Reed Diffuser','Rinse aid','Rock Salt','Salt Blocks','Sanitary Bags','Signage (Use Notes)','Sponges','Sugar','Sugar 1kg','Sugar cubes','Tea Bags','Tin Foil 30m','Tin foil 10m','Toilet roll 48 WGAC','Toilet Rolls','Toilet Roll WGAC','Washing Capsules 20','Washing Capsules 40','Washing powder 40 wash','Washing Up liquid Small','Washing Up Liquid Large','Other (see notes below)'];

const STAFF = ['Adele','Barry','Fin','Jade','Jenny','Jo','Lucy','Martine','Meg','Mike','Nicky','Saul','Tash'];

// ─── STATE ───────────────────────────────────────────────────────────────────
let todayStr       = '';
let todayProps     = new Set();   // properties with check-ins today
let byLodge        = {};          // lodge → items[] (sorted)
let currentLodge   = '';
let pendingItems   = [];          // items shown in detail view
let logOpen        = false;

// URL param pre-selection
const urlLodge = new URLSearchParams(location.search).get('lodge') || '';

// ─── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadData);

async function loadData() {
  const today = new Date();
  todayStr = localDate(today);
  setHdrSub(today.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' }));
  document.getElementById('view-home').innerHTML = '<div class="loading"><span class="spin"></span>Loading today\'s data…</div>';
  document.getElementById('refreshBtn').disabled = true;

  try {
    const [arrivals, supplies] = await Promise.all([fetchArrivals(), fetchSupplies()]);
    processArrivals(arrivals);
    processSupplies(supplies);
    if (urlLodge && byLodge[urlLodge]) {
      openLodge(urlLodge);
    } else {
      renderHome();
    }
  } catch(e) {
    document.getElementById('view-home').innerHTML = `<div class="empty">⚠️ Failed to load data.<br><small style="color:var(--sage-mid)">${e.message}</small></div>`;
  }
  document.getElementById('refreshBtn').disabled = false;
}

// ─── API ─────────────────────────────────────────────────────────────────────
async function mq(query, variables) {
  const resp = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': MONDAY_TOKEN, 'API-Version': '2024-01' },
    body: JSON.stringify({ query, variables: variables || {} })
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const j = await resp.json();
  if (j.errors) throw new Error(j.errors[0].message);
  return j.data;
}

async function fetchArrivals() {
  // Fetch just enough to get today's arriving properties
  let items = [], cursor = null;
  do {
    const cp = cursor ? `, cursor: "${cursor}"` : '';
    const d = await mq(`{ boards(ids: [${ARRIVALS_BOARD}]) { items_page(limit: 500${cp}) { cursor items { column_values(ids: ["date_mm2adtwg","text_mm2ahbrx"]) { id value } } } } }`);
    const page = d.boards[0].items_page;
    items = items.concat(page.items);
    cursor = page.cursor;
  } while (cursor);
  return items;
}

async function fetchSupplies() {
  const d = await mq(`{ boards(ids: [${SUPPLIES_BOARD}]) { groups(ids: ["${SUP_GROUP}"]) { items_page(limit: 500) { items { id name column_values(ids: ["text6__1","text60__1","text5__1","numbers_MjiukVMp","priority6__1","date4","text__1"]) { id text value } } } } } }`);
  return d?.boards?.[0]?.groups?.[0]?.items_page?.items || [];
}

async function createItem(lodge, item, qty, prio, staff, notes, isOther) {
  const vals = JSON.stringify({ text6__1: lodge, text60__1: isOther?'Other':item, text5__1: isOther?item:'', numbers_MjiukVMp: qty, priority6__1: {index:prio}, status: {index:0}, date4: {date: todayStr}, dropdown8__1: {labels:[staff]}, text__1: notes });
  return mq(`mutation($bId:ID!,$gId:String!,$name:String!,$vals:JSON!){create_item(board_id:$bId,group_id:$gId,item_name:$name,column_values:$vals){id}}`, { bId: String(SUPPLIES_BOARD), gId: SUP_GROUP, name: `${lodge} – ${item}`, vals });
}

async function markDelivered(ids) {
  const m = ids.map((id,i) => `m${i}a:change_column_value(board_id:${SUPPLIES_BOARD},item_id:${id},column_id:"status",value:"{\\"index\\":1}"){id} m${i}b:move_item_to_group(item_id:${id},group_id:"${CHARGEABLE_GROUP}"){id}`).join('\n');
  return mq(`mutation{${m}}`);
}

// ─── DATA PROCESSING ─────────────────────────────────────────────────────────
function processArrivals(items) {
  todayProps = new Set();
  items.forEach(item => {
    const p = v => { try { return JSON.parse(v); } catch { return null; } };
    const cv = {};
    item.column_values.forEach(c => cv[c.id] = c.value);
    const date = p(cv['date_mm2adtwg'])?.date;
    const prop = p(cv['text_mm2ahbrx']);
    if (date === todayStr && prop) todayProps.add(prop);
  });
}

function processSupplies(items) {
  byLodge = {};
  items.forEach(item => {
    const lodge = cv(item, 'text6__1');
    if (!lodge) return;
    if (!byLodge[lodge]) byLodge[lodge] = [];
    byLodge[lodge].push(item);
  });
  Object.values(byLodge).forEach(arr => arr.sort(sortItems));
}

function sortItems(a, b) {
  const pA = prioRank(cv(a,'priority6__1')), pB = prioRank(cv(b,'priority6__1'));
  if (pA !== pB) return pA - pB;
  const dA = cv(a,'date4') || '9999-12-31', dB = cv(b,'date4') || '9999-12-31';
  return dA.localeCompare(dB); // oldest logged first within same priority
}

// ─── HOME VIEW ────────────────────────────────────────────────────────────────
function renderHome() {
  setHdrTitle('Today\'s Deliveries');
  document.getElementById('backBtn').classList.remove('visible');

  const todayLodges = [], otherLodges = [];
  Object.entries(byLodge).forEach(([lodge, items]) => {
    (todayProps.has(lodge) ? todayLodges : otherLodges).push([lodge, items]);
  });

  const sortLodge = (a, b) => {
    const pA = prioRank(cv(a[1][0],'priority6__1')), pB = prioRank(cv(b[1][0],'priority6__1'));
    if (pA !== pB) return pA - pB;
    const overdueA = a[1].filter(i=>daysOld(cv(i,'date4'))>OVERDUE_DAYS).length;
    const overdueB = b[1].filter(i=>daysOld(cv(i,'date4'))>OVERDUE_DAYS).length;
    return overdueB - overdueA || b[1].length - a[1].length;
  };
  todayLodges.sort(sortLodge);
  otherLodges.sort(sortLodge);

  // Global critical count for banner
  const allItems = Object.values(byLodge).flat();
  const critTotal   = allItems.filter(i => cv(i,'priority6__1')==='Critical').length;
  const overdueTotal= allItems.filter(i => daysOld(cv(i,'date4')) > OVERDUE_DAYS).length;

  let html = '';

  if (critTotal > 0) {
    html += `<div class="crit-banner"><div><div class="crit-banner-num">${critTotal}</div><div class="crit-banner-lbl">Critical item${critTotal>1?'s':''} outstanding</div></div></div>`;
  }

  if (overdueTotal > 0 && critTotal === 0) {
    html += `<div style="background:#fdf5e8;border:1.5px solid #d4b080;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--amber);font-weight:600;">⚠️ ${overdueTotal} item${overdueTotal>1?'s':''} outstanding for more than ${OVERDUE_DAYS} days</div>`;
  } else if (overdueTotal > 0) {
    html += `<div style="background:#fdf5e8;border:1.5px solid #d4b080;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--amber);font-weight:600;">⚠️ ${overdueTotal} item${overdueTotal>1?'s also':' also'} overdue (>${OVERDUE_DAYS} days)</div>`;
  }

  if (todayLodges.length) {
    html += `<div class="sh">🏠 Today's Changeovers — ${todayLodges.length} lodge${todayLodges.length>1?'s':''} need supplies</div>`;
    html += todayLodges.map(e => lodgeCard(e[0], e[1], true)).join('');
  } else {
    html += `<div class="sh">🏠 Today's Changeovers</div><p class="sh-note">No lodges with check-ins today have outstanding supply requests.</p>`;
  }

  if (otherLodges.length) {
    html += `<div class="sh">📦 Other Outstanding Items</div>`;
    html += otherLodges.map(e => lodgeCard(e[0], e[1], false)).join('');
  }

  if (!todayLodges.length && !otherLodges.length) {
    html = `<div class="empty" style="padding-top:60px">✅ No outstanding supply requirements.<br>All lodges are fully stocked.</div>`;
  }

  html += `<div class="sh" style="margin-top:24px">Visit any lodge</div>
    <div class="any-lodge-wrap">
      <label>Select a lodge to see its requirements or log a shortage</label>
      <select class="any-lodge-select" onchange="if(this.value){openLodge(this.value);this.value=''}">
        <option value="">Choose lodge…</option>
        ${LODGES.map(l=>`<option value="${l}">${l}</option>`).join('')}
      </select>
    </div>`;

  document.getElementById('view-home').innerHTML = html;
  showView('home');

  // Update subtitle
  const parts = [];
  if (todayLodges.length) parts.push(`${todayLodges.length} changeover${todayLodges.length>1?'s':''} need supplies`);
  if (otherLodges.length) parts.push(`${otherLodges.length} other lodge${otherLodges.length>1?'s':''}`);
  setHdrSub(parts.length ? parts.join(' · ') : 'No outstanding items');
}

function lodgeCard(lodge, items, isToday) {
  const maxPrio = cv(items[0],'priority6__1') || 'Low';
  const cls     = maxPrio.toLowerCase();
  const critCount   = items.filter(i => cv(i,'priority6__1')==='Critical').length;
  const highCount   = items.filter(i => cv(i,'priority6__1')==='High').length;
  const overdueCount= items.filter(i => daysOld(cv(i,'date4')) > OVERDUE_DAYS).length;
  const safeL = lodge.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

  const tags = [];
  if (critCount)    tags.push(`<span class="tag tag-crit">🚨 ${critCount} Critical</span>`);
  if (overdueCount) tags.push(`<span class="tag tag-overdue">⚠️ ${overdueCount} overdue</span>`);
  if (!critCount && highCount) tags.push(`<span class="tag tag-high">${highCount} High</span>`);
  if (!critCount && !highCount && !overdueCount) tags.push(`<span class="tag tag-ok">${items.length} item${items.length>1?'s':''}</span>`);

  return `
    <div class="lodge-card p-${cls}" onclick="openLodge('${safeL}')">
      <div class="lc-body">
        <div class="lc-name">${esc(lodge)}</div>
        ${isToday ? `<div class="lc-arrival">📅 Arrival today</div>` : ''}
        <div class="lc-tags">${tags.join('')}</div>
      </div>
      <div class="lc-right">
        <div class="lc-count">${items.length}</div>
        <div class="lc-count-lbl">item${items.length>1?'s':''}</div>
        <span class="lc-arrow">›</span>
      </div>
    </div>`;
}

// ─── DETAIL VIEW ─────────────────────────────────────────────────────────────
function openLodge(lodge) {
  currentLodge = lodge;
  pendingItems = (byLodge[lodge] || []).slice(); // copy so we can refresh
  logOpen      = false;
  setHdrTitle(lodge);
  setHdrSub('');
  document.getElementById('backBtn').classList.add('visible');
  renderDetail();
  showView('detail');
}

function goHome() {
  showView('home');
  setHdrTitle("Today's Deliveries");
  document.getElementById('backBtn').classList.remove('visible');
}

function renderDetail() {
  const lodge = currentLodge;
  const items = pendingItems;
  const isToday = todayProps.has(lodge);
  const el = document.getElementById('view-detail');

  const critCount   = items.filter(i=>cv(i,'priority6__1')==='Critical').length;
  const overdueCount= items.filter(i=>daysOld(cv(i,'date4'))>OVERDUE_DAYS).length;

  let html = '';

  // Arrival banner
  if (isToday) html += `<div class="arr-banner">📅 Arrival today — deliver before check-in</div>`;

  // Critical alert if items exist
  if (critCount > 0) {
    html += `<div style="background:var(--red);color:#fff;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:700;">🚨 ${critCount} Critical item${critCount>1?'s':''} — prioritise these</div>`;
  }
  if (overdueCount > 0) {
    html += `<div style="background:#fdf5e8;border:1.5px solid #d4b080;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--amber);font-weight:600;">⚠️ ${overdueCount} item${overdueCount>1?'s have':' has'} been outstanding for over ${OVERDUE_DAYS} days</div>`;
  }

  if (items.length === 0) {
    html += `<div class="empty">✅ No outstanding requirements for ${esc(lodge)}</div>`;
  } else {
    // Group by priority
    const GROUPS = ['Critical','High','Medium','Low'];
    GROUPS.forEach(prio => {
      const grp = items.filter(i => (cv(i,'priority6__1')||'Low') === prio);
      if (!grp.length) return;
      const pc = prio.toLowerCase();
      html += `<div class="prio-head">
        <div class="prio-head-dot prio-dot-${pc}"></div>
        <span class="prio-head-label-${pc}">${prio}</span>
        <span class="prio-head-count">${grp.length} item${grp.length>1?'s':''}</span>
      </div>`;
      html += grp.map(item => itemRow(item)).join('');
    });

    html += `<div class="deliver-zone">
      <div class="action-btns">
        <button class="btn-sm" onclick="selectAll()">Select All</button>
        <button class="btn-sm" onclick="clearAll()">Clear</button>
      </div>
      <button class="btn-deliver" id="deliverBtn" onclick="confirmDelivery()">✅ Confirm Delivery</button>
    </div>`;
  }

  // Log shortage section — always shown
  html += `
    <button class="log-toggle" onclick="toggleLog()" id="logToggleBtn">➕ Log a shortage spotted here</button>
    <div class="log-panel" id="logPanel">
      <h3>Log a shortage at ${esc(lodge)}</h3>
      ${buildLogForm()}
    </div>`;

  el.innerHTML = html;

  // Restore log panel state
  if (logOpen) {
    document.getElementById('logPanel').classList.add('open');
  }
}

function itemRow(item) {
  const supply  = cv(item,'text60__1') || item.name;
  const other   = cv(item,'text5__1');
  const qty     = cv(item,'numbers_MjiukVMp') || '1';
  const prio    = cv(item,'priority6__1') || 'Low';
  const notes   = cv(item,'text__1');
  const dateStr = cv(item,'date4');
  const days    = daysOld(dateStr);
  const overdue = days > OVERDUE_DAYS;
  const pc      = prio.toLowerCase();

  let ageHtml = '';
  if (days === 0)      ageHtml = '<span class="age-ok">Today</span>';
  else if (!overdue)   ageHtml = `<span class="age-ok">${days} day${days>1?'s':''} ago</span>`;
  else                 ageHtml = `<span class="age-overdue">⚠️ ${days} days — overdue</span>`;

  return `
    <div class="item-row p-${pc}${overdue?' overdue':''}" id="ir-${item.id}" onclick="toggleItem('${item.id}')">
      <input type="checkbox" class="item-chk" id="chk-${item.id}" onclick="event.stopPropagation();toggleItem('${item.id}')">
      <div class="item-body">
        <div class="item-name">${esc(supply)}${other&&supply!==other?` — ${esc(other)}`:''}</div>
        <div class="item-meta">
          <span class="pill pill-${pc}">${prio}</span>
          <span class="item-qty">×${qty}</span>
          ${ageHtml}
        </div>
        ${notes ? `<div class="item-notes">${esc(notes)}</div>` : ''}
      </div>
    </div>`;
}

function buildLogForm() {
  const itemOpts  = SUPPLY_ITEMS.map(s=>`<option value="${s}">${s}</option>`).join('');
  const staffOpts = STAFF.map(s=>`<option value="${s}">${s}</option>`).join('');
  return `
    <div class="fld">
      <label>Item needed</label>
      <select id="logItem" onchange="checkOther()">
        <option value="">Select item…</option>
        ${itemOpts}
      </select>
      <div class="other-warn" id="logOtherWarn">⚠️ Only use "Other" if the item genuinely isn't listed. Describe it in notes below.</div>
    </div>
    <div class="fld-row">
      <div class="fld">
        <label>Qty</label>
        <input type="number" id="logQty" value="1" min="1">
      </div>
      <div class="fld">
        <label>Priority</label>
        <select id="logPrio">
          <option value="0">Critical</option>
          <option value="1">High</option>
          <option value="2" selected>Medium</option>
          <option value="3">Low</option>
        </select>
      </div>
    </div>
    <div class="fld">
      <label>Your name</label>
      <select id="logStaff">
        <option value="">Select…</option>
        ${staffOpts}
      </select>
    </div>
    <div class="fld">
      <label>Notes (optional)</label>
      <textarea id="logNotes" placeholder="Any extra detail…"></textarea>
    </div>
    <button class="btn-submit" id="logSubmitBtn" onclick="submitLog()">Submit Shortage</button>`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function toggleItem(id) {
  const chk = document.getElementById('chk-'+id);
  const row = document.getElementById('ir-'+id);
  if (chk && row) { chk.checked = !chk.checked; row.classList.toggle('checked', chk.checked); }
}
function selectAll() {
  pendingItems.forEach(i => { const c=document.getElementById('chk-'+i.id),r=document.getElementById('ir-'+i.id); if(c){c.checked=true;r?.classList.add('checked');} });
}
function clearAll() {
  pendingItems.forEach(i => { const c=document.getElementById('chk-'+i.id),r=document.getElementById('ir-'+i.id); if(c){c.checked=false;r?.classList.remove('checked');} });
}

function toggleLog() {
  logOpen = !logOpen;
  document.getElementById('logPanel').classList.toggle('open', logOpen);
  document.getElementById('logToggleBtn').textContent = logOpen ? '✕ Close' : '➕ Log a shortage spotted here';
}

function checkOther() {
  const val = document.getElementById('logItem')?.value;
  const w   = document.getElementById('logOtherWarn');
  if (w) w.className = 'other-warn' + (val==='Other (see notes below)'?' show':'');
}

async function confirmDelivery() {
  const checked = pendingItems.filter(i => document.getElementById('chk-'+i.id)?.checked);
  if (!checked.length) { showToast('Tick items to mark as delivered','err'); return; }
  const btn = document.getElementById('deliverBtn');
  btn.innerHTML = '<span class="spin"></span>Confirming…'; btn.disabled = true;
  try {
    await markDelivered(checked.map(i=>i.id));
    showToast(`✅ ${checked.length} item${checked.length>1?'s':''} delivered & chargeable`,'ok');
    // Remove delivered items from state and re-render
    const checkedIds = new Set(checked.map(i=>i.id));
    byLodge[currentLodge] = (byLodge[currentLodge]||[]).filter(i=>!checkedIds.has(i.id));
    pendingItems = byLodge[currentLodge];
    setTimeout(renderDetail, 1300);
  } catch(e) {
    showToast('Failed: '+e.message,'err');
    btn.innerHTML = '✅ Confirm Delivery'; btn.disabled = false;
  }
}

async function submitLog() {
  const item  = document.getElementById('logItem')?.value;
  const qty   = parseInt(document.getElementById('logQty')?.value) || 1;
  const prio  = parseInt(document.getElementById('logPrio')?.value);
  const staff = document.getElementById('logStaff')?.value;
  const notes = document.getElementById('logNotes')?.value || '';
  if (!item)  { showToast('Select an item','err'); return; }
  if (!staff) { showToast('Select your name','err'); return; }
  const isOther = item === 'Other (see notes below)';
  const btn = document.getElementById('logSubmitBtn');
  btn.innerHTML = '<span class="spin"></span>Submitting…'; btn.disabled = true;
  try {
    const result = await createItem(currentLodge, item, qty, prio, staff, notes, isOther);
    showToast('✅ Shortage logged','ok');
    // Add a mock item to state so it appears immediately (will be refreshed on reload)
    const newId = result?.create_item?.id || ('tmp-'+Date.now());
    const mockItem = {
      id: newId, name: `${currentLodge} – ${item}`,
      column_values: [
        {id:'text6__1',text:currentLodge,value:null},
        {id:'text60__1',text:isOther?'Other':item,value:null},
        {id:'text5__1',text:isOther?item:'',value:null},
        {id:'numbers_MjiukVMp',text:String(qty),value:null},
        {id:'priority6__1',text:['Critical','High','Medium','Low'][prio],value:null},
        {id:'date4',text:todayStr,value:null},
        {id:'text__1',text:notes,value:null}
      ]
    };
    if (!byLodge[currentLodge]) byLodge[currentLodge] = [];
    byLodge[currentLodge].push(mockItem);
    byLodge[currentLodge].sort(sortItems);
    pendingItems = byLodge[currentLodge];
    logOpen = false;
    setTimeout(renderDetail, 1200);
  } catch(e) {
    showToast('Failed: '+e.message,'err');
    btn.innerHTML = 'Submit Shortage'; btn.disabled = false;
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function cv(item, id) { return item.column_values?.find(c=>c.id===id)?.text||''; }
function prioRank(t)  { return t==='Critical'?0:t==='High'?1:t==='Medium'?2:3; }
function daysOld(dateStr) {
  if (!dateStr) return 0;
  return Math.max(0, Math.floor((Date.now()-new Date(dateStr+'T00:00:00').getTime())/86400000));
}
function localDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s) { return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }
function setHdrTitle(t) { document.getElementById('hdrTitle').textContent = t; }
function setHdrSub(t)   { document.getElementById('hdrSub').textContent   = t; }

function showView(v) {
  document.getElementById('view-home').classList.toggle('hidden', v!=='home');
  document.getElementById('view-detail').classList.toggle('hidden', v!=='detail');
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast ' + (type||'') + ' show';
  setTimeout(()=>{ el.className='toast'; }, 3200);
}
</script>
