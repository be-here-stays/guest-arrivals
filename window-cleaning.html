<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Be Here — Window Cleaning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#D5D0C4; --dark:#272F2E; --sage:#646955; --sage-mid:#989782;
      --gold:#AF926A; --cream:#F3E3C3; --surface:#fff; --border:#e0ddd6;
      --red:#8B2020; --red-bg:#fdf0ec; --amber:#a86c00; --amber-bg:#fdf5e8;
      --green:#2d6a4f; --green-bg:#edf7f2; --purple:#4a3a6e; --purple-bg:#e8e5f0;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Instrument Sans',-apple-system,sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; padding-bottom:env(safe-area-inset-bottom); }

    /* Header */
    header { background:var(--dark); color:#fff; padding:16px 20px; padding-top:max(16px,env(safe-area-inset-top)); display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .hdr-logo svg { display:block; width:90px; height:auto; }
    .hdr-sub { font-size:10px; color:rgba(255,255,255,.5); margin-top:3px; letter-spacing:.3px; }
    .hdr-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .hdr-updated { font-size:11px; color:rgba(255,255,255,.4); white-space:nowrap; }
    .hdr-hub { color:rgba(255,255,255,.6); font-size:12px; font-weight:600; text-decoration:none; padding:5px 10px; border:1px solid rgba(255,255,255,.2); border-radius:6px; white-space:nowrap; }
    .hdr-hub:hover { background:rgba(255,255,255,.1); color:#fff; }

    /* API bar */
    .api-bar { background:#1e2522; padding:8px 20px; display:flex; align-items:center; gap:12px; }
    .load-btn { padding:6px 16px; background:var(--cream); color:var(--dark); border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
    .load-btn:hover { opacity:.85; }
    .load-btn:disabled { opacity:.5; cursor:not-allowed; }
    .api-status { font-size:12px; color:rgba(255,255,255,.7); }

    /* Stats */
    .stats-wrap { padding:16px 20px 0; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .stats-wrap::-webkit-scrollbar { display:none; }
    .stats-row { display:flex; gap:10px; min-width:max-content; }
    .stat-card { background:var(--surface); border-radius:10px; padding:12px 16px; min-width:100px; box-shadow:0 1px 3px rgba(39,47,46,.07); }
    .stat-val { font-size:28px; font-weight:700; line-height:1.1; color:var(--dark); }
    .stat-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--sage-mid); margin-top:3px; }
    .s-overdue .stat-val { color:var(--red); }
    .s-due     .stat-val { color:var(--amber); }
    .s-ok      .stat-val { color:var(--green); }

    /* Content */
    .content { padding:16px 20px 40px; }
    .sec-lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--sage-mid); margin:20px 0 10px; display:flex; align-items:center; gap:8px; }
    .sec-lbl::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Property rows */
    .prop-row { background:var(--surface); border-radius:12px; padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 3px rgba(39,47,46,.07); border-left:4px solid var(--border); transition:box-shadow .15s; }
    .prop-row:hover { box-shadow:0 3px 10px rgba(39,47,46,.12); }
    .prop-row.overdue { border-left-color:var(--red); }
    .prop-row.due     { border-left-color:var(--amber); }
    .prop-row.ok      { border-left-color:var(--green); }
    .prop-row.never   { border-left-color:#b0ab9f; }
    .prop-info { flex:1; min-width:0; }
    .prop-name { font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .prop-sub  { font-size:12px; color:var(--sage-mid); margin-top:3px; }
    .prop-tags { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
    .tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:8px; text-transform:uppercase; letter-spacing:.3px; white-space:nowrap; }
    .tag-overdue { background:var(--red-bg);    color:var(--red); }
    .tag-due     { background:var(--amber-bg);  color:var(--amber); }
    .tag-ok      { background:var(--green-bg);  color:var(--green); }
    .tag-never   { background:#f0eeea;           color:var(--sage-mid); }
    .tag-bal     { background:var(--purple-bg); color:var(--purple); }
    .log-btn { padding:7px 14px; background:var(--dark); color:var(--cream); border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; flex-shrink:0; }
    .log-btn:hover { background:var(--sage); }

    /* Modal — slides up from bottom */
    .modal-overlay { position:fixed; inset:0; background:rgba(39,47,46,.55); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
    .modal { background:var(--surface); border-radius:20px 20px 0 0; padding:24px 24px calc(28px + env(safe-area-inset-bottom)); width:100%; max-width:480px; }
    .modal-title { font-size:18px; font-weight:700; margin-bottom:4px; }
    .modal-sub   { font-size:13px; color:var(--sage); margin-bottom:20px; }
    .fld { margin-bottom:14px; }
    .fld label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--sage-mid); margin-bottom:6px; }
    .fld input[type="date"] { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; background:var(--surface); color:var(--dark); font-size:15px; font-family:inherit; outline:none; }
    .fld input[type="date"]:focus { border-color:var(--dark); }
    .fld textarea { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; background:var(--surface); color:var(--dark); font-size:14px; font-family:inherit; outline:none; resize:vertical; min-height:56px; }
    .fld textarea:focus { border-color:var(--dark); }
    .time-row { display:grid; grid-template-columns:1fr auto 1fr auto; gap:8px; align-items:center; }
    .time-row input[type="number"] { padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; background:var(--surface); color:var(--dark); font-size:15px; font-family:inherit; outline:none; text-align:center; -moz-appearance:textfield; }
    .time-row input::-webkit-outer-spin-button, .time-row input::-webkit-inner-spin-button { -webkit-appearance:none; }
    .time-row input:focus { border-color:var(--dark); }
    .time-sep { font-size:13px; color:var(--sage-mid); font-weight:600; }
    .check-row { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--purple-bg); border-radius:8px; cursor:pointer; }
    .check-row input[type="checkbox"] { width:18px; height:18px; accent-color:var(--purple); cursor:pointer; flex-shrink:0; }
    .check-row span { font-size:14px; font-weight:600; color:var(--purple); }
    .modal-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:18px; }
    .btn-cancel  { padding:13px; background:transparent; border:1.5px solid var(--border); color:var(--sage); border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn-submit  { padding:13px; background:var(--dark); color:var(--cream); border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn-submit:hover { background:var(--sage); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; }
    .modal-err { font-size:12px; color:var(--red); min-height:18px; margin-top:6px; }

    /* Toast */
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--dark); color:var(--cream); border-radius:10px; padding:12px 22px; font-size:13px; font-weight:600; z-index:9999; transition:transform .3s; white-space:nowrap; pointer-events:none; box-shadow:0 8px 24px rgba(39,47,46,.3); }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.ok  { background:var(--sage); }
    .toast.err { background:var(--red); }

    .empty { text-align:center; padding:48px 20px; color:var(--sage-mid); font-size:14px; }
    .spin { display:inline-block; width:18px; height:18px; border:2px solid rgba(100,105,85,.2); border-top-color:var(--sage-mid); border-radius:50%; animation:sp .7s linear infinite; vertical-align:middle; }
    @keyframes sp { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<script>
const TOKEN        = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY0NjkyOTc2MCwiYWFpIjoxMSwidWlkIjoxMDIyMzcwODYsImlhZCI6IjIwMjYtMDQtMTdUMTA6NTQ6MzcuMDAwWiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjE0MTkxNjYwLCJyZ24iOiJldWMxIn0.22emTc6IL6ShMMn6jzWAH-50xVzI6zBA-y2Yn7EAxAE';
const BOARD_ID     = 1987064628;  // Windows & Balustrades
const LOC_BOARD_ID = 1928673949;  // Lodge Status — master property list (Guesty IDs)
const GUESTY_COL   = 'text_mktq3qh';   // Guesty ID column on Lodge Status
const MAINT_GUESTY = 'text_mm2gq5rd';  // Guesty ID column on Windows board
const DUE_DAYS     = 42;          // 6 weeks
const OVERDUE_DAYS = 56;          // 8 weeks

let _items = [];
let _activeItem = null;

async function mq(q) {
  const r = await fetch('https://api.monday.com/v2', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':TOKEN,'API-Version':'2024-01'},
    body:JSON.stringify({query:q})
  });
  const j = await r.json();
  if (j.errors) throw new Error(j.errors[0].message);
  return j.data;
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr)) / 86400000);
}

function getCleanStatus(dateStr) {
  const d = daysSince(dateStr);
  if (d === null) return 'never';
  if (d > OVERDUE_DAYS) return 'overdue';
  if (d >= DUE_DAYS)    return 'due';
  return 'ok';
}

function fmtDays(d) {
  if (d === null) return 'Never cleaned';
  if (d === 0) return 'Cleaned today';
  if (d === 1) return '1 day ago';
  if (d < 7)  return `${d} days ago`;
  const w = Math.floor(d / 7), rem = d % 7;
  return w + ' wk' + (w > 1 ? 's' : '') + (rem ? ` ${rem}d` : '') + ' ago';
}

function tagHtml(status) {
  if (status === 'overdue') return '<span class="tag tag-overdue">Overdue</span>';
  if (status === 'due')     return '<span class="tag tag-due">Due Soon</span>';
  if (status === 'ok')      return '<span class="tag tag-ok">Up to date</span>';
  return '<span class="tag tag-never">Never logged</span>';
}

async function loadAll() {
  document.getElementById('loadBtn').disabled = true;
  document.getElementById('apiStatus').textContent = 'Loading…';
  document.getElementById('mainContent').innerHTML = '<div class="empty"><span class="spin"></span>&nbsp;Loading properties…</div>';
  ['stOverdue','stDue','stOk','stNever'].forEach(id => document.getElementById(id).textContent = '—');

  try {
    // Fetch Lodge Status (master — has Guesty IDs) and Windows board in parallel
    const [locData, maintData] = await Promise.all([
      mq(`{ boards(ids:[${LOC_BOARD_ID}]) { items_page(limit:100) { items { id name column_values(ids:["${GUESTY_COL}"]) { id text } } } } }`),
      mq(`{ boards(ids:[${BOARD_ID}]) { items_page(limit:500) { items { id name column_values(ids:["date4","text_mktp76yg","${MAINT_GUESTY}"]) { id text value } } } } }`)
    ]);

    // Build maintenance lookup keyed by Guesty ID
    const maintMap = new Map();
    for (const item of maintData?.boards?.[0]?.items_page?.items || []) {
      const cv = {}; item.column_values.forEach(c => cv[c.id] = c);
      const dateStr = (() => { try { return JSON.parse(cv['date4']?.value||'null')?.date||null; } catch { return null; } })();
      const guestyId = cv[MAINT_GUESTY]?.text?.trim();
      if (guestyId) {
        maintMap.set(guestyId, {
          id: item.id,
          dateStr,
          balustrade: cv['text_mktp76yg']?.text?.trim().toUpperCase() === 'Y',
        });
      }
    }

    // Build display list from Lodge Status, excluding placeholder entries
    const locItems = (locData?.boards?.[0]?.items_page?.items || [])
      .filter(item => !item.name.match(/^Item \d+$/i));

    _items = locItems.map(locItem => {
      const locName  = locItem.name;
      const guestyId = locItem.column_values[0]?.text?.trim();
      const maint    = guestyId ? maintMap.get(guestyId) : null;

      const dateStr = maint?.dateStr || null;
      return {
        id:         maint?.id   || null,   // null = no record in Windows board yet
        name:       locName,
        dateStr,
        days:       daysSince(dateStr),
        status:     getCleanStatus(dateStr),
        balustrade: maint?.balustrade || false,
        noRecord:   !maint,
      };
    });

    // Sort: never/noRecord → overdue (oldest first) → due → ok
    const order = { never:0, overdue:1, due:2, ok:3 };
    _items.sort((a, b) => {
      const od = order[a.status] - order[b.status];
      if (od !== 0) return od;
      return (b.days ?? 99999) - (a.days ?? 99999);
    });

    // Stats
    const counts = { overdue:0, due:0, ok:0, never:0 };
    _items.forEach(i => counts[i.status]++);
    document.getElementById('stOverdue').textContent = counts.overdue;
    document.getElementById('stDue').textContent     = counts.due;
    document.getElementById('stOk').textContent      = counts.ok;
    document.getElementById('stNever').textContent   = counts.never;

    renderList();

    const now = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastLoaded').textContent = `Updated ${now}`;
    document.getElementById('apiStatus').textContent  = `✓ ${_items.length} properties loaded`;
  } catch(e) {
    document.getElementById('apiStatus').textContent = '⚠ ' + e.message;
    document.getElementById('mainContent').innerHTML = `<div class="empty">⚠️ Could not load data.<br><small style="color:var(--sage-mid)">${e.message}</small></div>`;
  } finally {
    document.getElementById('loadBtn').disabled = false;
  }
}

function renderList() {
  const groups = [
    { key:'never',   label:'Never Cleaned',               items:[] },
    { key:'overdue', label:'Overdue',                      items:[] },
    { key:'due',     label:'Due for Cleaning (6–8 weeks)', items:[] },
    { key:'ok',      label:'Up to Date',                   items:[] },
  ];
  _items.forEach(i => groups.find(g => g.key === i.status).items.push(i));

  let html = '';
  groups.forEach(g => {
    if (!g.items.length) return;
    html += `<div class="sec-lbl">${g.label}</div>`;
    g.items.forEach(i => {
      const logBtn = i.id
        ? `<button class="log-btn" onclick="openModal(${JSON.stringify(i.name)})">Log Clean</button>`
        : `<button class="log-btn" style="opacity:.4;cursor:default" title="Not yet in Windows board">No record</button>`;
      html += `
        <div class="prop-row ${i.status}">
          <div class="prop-info">
            <div class="prop-name">${i.name}</div>
            <div class="prop-sub">${fmtDays(i.days)}${i.dateStr ? ' · ' + i.dateStr : ''}</div>
            <div class="prop-tags">
              ${tagHtml(i.status)}
              ${i.balustrade ? '<span class="tag tag-bal">🏛 Balustrades</span>' : ''}
            </div>
          </div>
          ${logBtn}
        </div>`;
    });
  });

  document.getElementById('mainContent').innerHTML = html || '<div class="empty">No properties found.</div>';
}

function openModal(propName) {
  const item = _items.find(i => i.name === propName);
  if (!item || !item.id) return;
  _activeItem = item;
  document.getElementById('modalTitle').textContent = 'Log Window Clean';
  document.getElementById('modalSub').textContent = item.name + (item.balustrade ? ' · includes balustrades' : '');
  document.getElementById('logDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('logHrs').value  = '';
  document.getElementById('logMins').value = '';
  document.getElementById('logNotes').value = '';
  document.getElementById('modalErr').textContent = '';
  document.getElementById('balField').style.display = item.balustrade ? 'block' : 'none';
  document.getElementById('balCheck').checked = false;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  _activeItem = null;
}

async function submitLog() {
  const date  = document.getElementById('logDate').value;
  const hrs   = parseInt(document.getElementById('logHrs').value) || 0;
  const mins  = parseInt(document.getElementById('logMins').value) || 0;
  const notes = document.getElementById('logNotes').value.trim();
  const bal   = document.getElementById('balCheck').checked;

  if (!date) { document.getElementById('modalErr').textContent = 'Please select a date.'; return; }

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('modalErr').textContent = '';

  try {
    const timeParts = [];
    if (hrs)  timeParts.push(`${hrs} hr${hrs > 1 ? 's' : ''}`);
    if (mins) timeParts.push(`${mins} min${mins > 1 ? 's' : ''}`);
    const timeStr = timeParts.length ? timeParts.join(' ') : 'not recorded';
    let noteBody = `Window clean completed on ${date}. Time taken: ${timeStr}.`;
    if (_activeItem.balustrade) noteBody += ` Balustrades: ${bal ? 'Yes' : 'No'}.`;
    if (notes) noteBody += ` Notes: ${notes}`;

    const colVals = JSON.stringify({ date4:{ date }, status:{ label:'Clean' } });
    await mq(`mutation { change_multiple_column_values(item_id:${_activeItem.id}, board_id:${BOARD_ID}, column_values:${JSON.stringify(colVals)}) { id } }`);
    await mq(`mutation { create_update(item_id:${_activeItem.id}, body:${JSON.stringify(noteBody)}) { id } }`);

    closeModal();
    showToast('Clean logged for ' + _activeItem.name, 'ok');
    await loadAll();
  } catch(e) {
    document.getElementById('modalErr').textContent = 'Error: ' + e.message;
    document.getElementById('submitBtn').disabled = false;
  }
}

let _toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadAll();
</script>
</body>
